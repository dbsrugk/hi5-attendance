<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#c0392b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="HI5 출결" />
<title>HI5 출결 & 갤러리</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23c0392b'/%3E%3Ctext x='50' y='65' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='900' font-size='40'%3EH5%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; overflow-x: hidden; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }

  .app { max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.05); position: relative; padding-bottom: 80px; }
  .app.no-tabbar { padding-bottom: 0; }
  .app.with-savebar { padding-bottom: 140px; }

  /* ============ 역할 선택 화면 ============ */
  .role-screen { min-height: 100vh; display: flex; flex-direction: column; padding: 0 32px; background: #ffffff; }
  .role-header { padding: 60px 0 40px; text-align: center; }
  .role-logo-box { display: inline-flex; align-items: center; gap: 12px; padding: 14px 22px; background: #fafafa; border: 1px solid #f0f0f0; border-radius: 12px; margin-bottom: 28px; }
  .role-logo-icon { background: #c0392b; color: #fff; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; border-radius: 4px; }
  .role-logo-text { color: #1a1a1a; text-align: left; }
  .role-logo-text-main { font-weight: 700; font-size: 15px; }
  .role-logo-text-sub { font-size: 10px; color: #888; letter-spacing: 1px; margin-top: 2px; }
  .role-greeting { color: #1a1a1a; font-size: 28px; font-weight: 900; line-height: 1.4; margin-bottom: 8px; }
  .role-greeting span { color: #c0392b; }
  .role-subtitle { color: #888; font-size: 14px; }
  .role-cards { flex: 1; display: flex; flex-direction: column; gap: 12px; padding: 20px 0 40px; justify-content: center; }
  .role-card { background: #fff; border: 1px solid #eaeaea; border-radius: 14px; padding: 22px; display: flex; align-items: center; gap: 18px; transition: all 0.2s; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
  .role-card:active { transform: scale(0.97); }
  .role-card:hover { border-color: #c0392b; box-shadow: 0 4px 16px rgba(192,57,43,0.08); }
  .role-card.disabled { opacity: 0.55; cursor: not-allowed; background: #fafafa; box-shadow: none; }
  .role-card.disabled:hover { border-color: #eaeaea; box-shadow: none; }
  .role-card.disabled .role-card-title { color: #555; }
  .role-card.disabled .role-card-desc { color: #aaa; }
  .role-card-icon { font-size: 36px; flex-shrink: 0; }
  .role-card-info { flex: 1; min-width: 0; }
  .role-card-title { font-size: 17px; font-weight: 800; color: #1a1a1a; margin-bottom: 4px; }
  .role-card-desc { font-size: 12px; color: #888; }
  .role-card-arrow { color: #c0392b; flex-shrink: 0; }
  .role-card.disabled .role-card-arrow { display: none; }
  .role-card-badge { display: inline-block; padding: 2px 8px; background: #f0f0f0; color: #999; font-size: 9px; font-weight: 700; border-radius: 3px; margin-left: 6px; letter-spacing: 0.5px; }
  .role-footer { text-align: center; color: #aaa; font-size: 11px; padding: 20px 0 40px; }

  /* ============ 비밀번호 화면 (역할 선택 후) ============ */
  .pwd-fullscreen { min-height: 100vh; background: #ffffff; display: flex; flex-direction: column; padding: 0 32px; }
  .pwd-back { padding: 20px 0; }
  .pwd-back-btn { background: #fafafa; border: 1px solid #eaeaea; color: #666; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .pwd-back-btn:active { background: #f0f0f0; }
  .pwd-back-btn:hover { color: #c0392b; border-color: #c0392b; }
  .pwd-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 60px; }
  .pwd-content .pwd-icon { width: 70px; height: 70px; background: #c0392b; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 24px; box-shadow: 0 8px 24px rgba(192,57,43,0.2); }
  .pwd-content .pwd-title { color: #1a1a1a; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .pwd-content .pwd-subtitle { color: #888; font-size: 13px; margin-bottom: 36px; }
  .pwd-form { width: 100%; max-width: 320px; }
  .pwd-input-wrap { position: relative; margin-bottom: 12px; }
  .pwd-input { width: 100%; padding: 16px 50px 16px 18px; border: 2px solid #eaeaea; background: #fafafa; color: #1a1a1a; border-radius: 10px; font-size: 16px; text-align: center; transition: all 0.2s; }
  .pwd-input:focus { outline: none; border-color: #c0392b; background: #fff; }
  .pwd-input.error { border-color: #c0392b; animation: shake 0.4s; }
  .pwd-input::placeholder { color: #bbb; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  .pwd-toggle { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 10px; color: #aaa; cursor: pointer; }
  .pwd-toggle:hover { color: #c0392b; }
  .pwd-toggle svg { width: 20px; height: 20px; }
  .pwd-btn { width: 100%; padding: 16px; background: #c0392b; color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 15px; transition: all 0.15s; box-shadow: 0 4px 12px rgba(192,57,43,0.2); }
  .pwd-btn:active { transform: scale(0.98); background: #a02e22; }
  .pwd-error-msg { color: #c0392b; font-size: 12px; margin-top: 8px; min-height: 16px; text-align: center; }

  /* ============ 메인 헤더 ============ */
  .header { background: #ffffff; color: #1a1a1a; padding: 16px 24px 18px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #f0f0f0; }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-box { background: #c0392b; color: #fff; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; letter-spacing: -0.5px; }
  .logo-text { font-weight: 700; font-size: 13px; letter-spacing: 0.5px; color: #1a1a1a; }
  .logo-text span { display: block; font-size: 10px; color: #999; font-weight: 400; letter-spacing: 1px; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .date-info { text-align: right; margin-right: 4px; }
  .date-main { font-size: 13px; font-weight: 500; color: #1a1a1a; }
  .date-sub { font-size: 11px; color: #999; margin-top: 2px; }
  .icon-header-btn { background: #fafafa; border: 1px solid #eaeaea; color: #666; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; position: relative; }
  .icon-header-btn:active { transform: scale(0.9); background: #f0f0f0; }
  .icon-header-btn:hover { color: #c0392b; border-color: #c0392b; }
  .icon-header-btn svg { width: 16px; height: 16px; }
  .conn-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; border-radius: 50%; background: #27ae60; border: 2px solid #ffffff; }
  .conn-dot.connecting { background: #f57c00; }
  .conn-dot.error { background: #c0392b; }

  /* 페이지 타이틀 영역 */
  .page-title-row { background: #fff; padding: 16px 24px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; }
  .page-title { font-size: 18px; font-weight: 800; }
  .page-action-btn { background: #c0392b; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }
  .page-action-btn:active { transform: scale(0.97); }

  /* 출결 통계 */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #f0f0f0; border-bottom: 1px solid #f0f0f0; }
  .stat { background: #ffffff; padding: 14px 8px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 900; line-height: 1; color: #1a1a1a; }
  .stat-num.red { color: #c0392b; }
  .stat-num.green { color: #27ae60; }
  .stat-label { font-size: 10px; color: #999; margin-top: 4px; letter-spacing: 0.5px; }

  /* 반 탭 */
  .tabs { display: flex; border-bottom: 1px solid #e8e8e8; background: #fff; overflow-x: auto; scrollbar-width: none; position: sticky; z-index: 8; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 14px 20px; font-size: 13px; font-weight: 500; color: #888; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .tab.active { color: #c0392b; border-bottom-color: #c0392b; font-weight: 700; }

  /* 학생 리스트 (출결) */
  .student-list { padding: 8px 0; }
  .student { display: flex; align-items: center; padding: 14px 24px; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
  .student:active { background: #fafafa; }
  .avatar { width: 44px; height: 44px; background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #1a1a1a; margin-right: 14px; flex-shrink: 0; border: 2px solid transparent; transition: all 0.2s; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .student.present .avatar { background: #1a1a1a; color: #fff; }
  .student.absent .avatar { background: #fff; border-color: #c0392b; color: #c0392b; }
  .student-info { flex: 1; min-width: 0; }
  .student-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .student-meta { font-size: 11px; color: #888; }
  .actions { display: flex; gap: 6px; }
  .btn { width: 44px; height: 36px; border: 1px solid #e8e8e8; background: #fff; border-radius: 6px; font-size: 11px; font-weight: 700; transition: all 0.15s; color: #888; }
  .btn:active { transform: scale(0.95); }
  .btn.present-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn.absent-btn.active { background: #c0392b; color: #fff; border-color: #c0392b; }

  /* 저장 바 */
  .save-bar { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid #e8e8e8; padding: 12px 20px; display: flex; gap: 10px; z-index: 11; }
  .save-bar.hidden { display: none; }
  .save-info { flex: 1; font-size: 11px; color: #888; display: flex; align-items: center; }
  .save-info strong { color: #1a1a1a; margin-right: 4px; }
  .save-btn { background: #c0392b; color: #fff; border: none; padding: 12px 28px; font-weight: 700; font-size: 13px; border-radius: 6px; transition: all 0.15s; }
  .save-btn:active { transform: scale(0.97); background: #a02e22; }
  .save-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* 토스트 */
  .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 6px; font-size: 13px; font-weight: 500; z-index: 1000; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 20px rgba(0,0,0,0.15); border-left: 3px solid #c0392b; max-width: 90%; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 로딩 */
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: #888; font-size: 13px; }
  .spinner { width: 24px; height: 24px; border: 3px solid #f0f0f0; border-top-color: #c0392b; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-screen { padding: 40px 24px; text-align: center; color: #c0392b; font-size: 13px; line-height: 1.6; }
  .error-screen strong { display: block; margin-bottom: 8px; font-size: 15px; }
  .empty-state { padding: 60px 24px; text-align: center; color: #888; font-size: 13px; line-height: 1.7; }
  .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
  .class-header { padding: 8px 24px; background: #fafafa; font-size: 11px; font-weight: 700; color: #c0392b; border-bottom: 1px solid #f0f0f0; }

  /* 모달 */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-start; justify-content: center; z-index: 100; overflow-y: auto; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; width: 100%; max-width: 480px; min-height: 100vh; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { background: #ffffff; color: #1a1a1a; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 5; border-bottom: 1px solid #f0f0f0; }
  .modal-title { font-weight: 700; font-size: 15px; }
  .modal-close { background: #fafafa; border: 1px solid #eaeaea; color: #666; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; line-height: 1; transition: all 0.15s; }
  .modal-close:active { background: #f0f0f0; }
  .modal-close:hover { color: #c0392b; border-color: #c0392b; }

  /* 리스트 아이템 */
  .list-item { padding: 14px 24px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; }
  .list-item-info { flex: 1; min-width: 0; }
  .list-item-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  .list-item-meta { font-size: 11px; color: #888; }
  .list-item-actions { display: flex; gap: 6px; }
  .icon-btn { width: 32px; height: 32px; background: #fff; border: 1px solid #e8e8e8; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #888; transition: all 0.15s; }
  .icon-btn:active { transform: scale(0.95); }
  .icon-btn svg { width: 14px; height: 14px; }
  .icon-btn.danger { color: #c0392b; }
  .icon-btn.danger:active { background: #ffebee; }

  /* 폼 */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
  .form-label-hint { font-weight: 400; color: #888; font-size: 11px; margin-left: 4px; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 12px 14px; border: 1px solid #e8e8e8; border-radius: 6px; font-size: 14px; transition: border-color 0.2s; }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-textarea.large { min-height: 160px; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #c0392b; }
  .form-buttons { display: flex; gap: 8px; margin-top: 24px; }
  .form-btn { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #e8e8e8; font-weight: 700; font-size: 13px; background: #fff; color: #888; transition: all 0.15s; }
  .form-btn:active { transform: scale(0.98); }
  .form-btn.primary { background: #c0392b; color: #fff; border-color: #c0392b; }
  .form-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 출결기록 */
  .record-controls { padding: 16px 24px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
  .date-input { width: 100%; padding: 10px 12px; border: 1px solid #e8e8e8; border-radius: 6px; font-size: 14px; margin-bottom: 8px; }
  .record-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
  .summary-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 6px; padding: 10px; text-align: center; }
  .summary-num { font-size: 18px; font-weight: 900; line-height: 1; }
  .summary-num.green { color: #27ae60; }
  .summary-num.red { color: #c0392b; }
  .summary-num.gray { color: #888; }
  .summary-label { font-size: 10px; color: #888; margin-top: 4px; }
  .record-status { display: inline-block; padding: 3px 8px; font-size: 10px; font-weight: 700; border-radius: 3px; }
  .record-status.present { background: #e8f5e9; color: #27ae60; }
  .record-status.absent { background: #ffebee; color: #c0392b; }
  .record-status.none { background: #f0f0f0; color: #888; }

  /* 갤러리 */
  .gallery-students { padding: 12px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .gallery-student-card { background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #f0f0f0; transition: all 0.2s; cursor: pointer; }
  .gallery-student-card:active { transform: scale(0.97); }
  .gallery-student-thumb { aspect-ratio: 1; background: #f0f0f0; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .gallery-student-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .gallery-student-thumb .placeholder { color: #ccc; font-size: 32px; font-weight: 900; }
  .gallery-student-info { padding: 8px 10px; }
  .gallery-student-name { font-weight: 700; font-size: 13px; }
  .gallery-student-count { font-size: 10px; color: #888; margin-top: 2px; }
  .gallery-class-section { padding: 0 0 16px; }
  .gallery-grid { padding: 4px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .gallery-tile { aspect-ratio: 1; background: #f0f0f0; cursor: pointer; overflow: hidden; transition: opacity 0.15s; }
  .gallery-tile:active { opacity: 0.7; }
  .gallery-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .student-gallery-header { padding: 20px 24px; background: #fafafa; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 14px; }
  .student-gallery-header .avatar { width: 56px; height: 56px; font-size: 20px; }
  .sgh-info { flex: 1; min-width: 0; }
  .sgh-name { font-size: 17px; font-weight: 700; }
  .sgh-meta { font-size: 12px; color: #888; margin-top: 2px; }
  .sgh-count { font-size: 11px; color: #c0392b; font-weight: 700; margin-top: 4px; }
  .back-btn { background: rgba(0,0,0,0.05); border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .back-btn:active { background: rgba(0,0,0,0.1); }
  .back-btn svg { width: 18px; height: 18px; color: #1a1a1a; }
  .student-gallery-add-btn { background: #c0392b; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .student-gallery-add-btn:active { transform: scale(0.97); }

  /* 작품 상세 */
  .artwork-detail { padding: 0; }
  .artwork-image { width: 100%; max-height: 70vh; object-fit: contain; background: #1a1a1a; display: block; }
  .artwork-info { padding: 20px 24px; }
  .artwork-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .artwork-student { font-size: 13px; color: #c0392b; font-weight: 700; margin-bottom: 12px; }
  .artwork-meta-row { font-size: 12px; color: #888; margin-bottom: 16px; }
  .artwork-description { font-size: 14px; line-height: 1.7; color: #1a1a1a; margin-bottom: 16px; white-space: pre-wrap; }
  .artwork-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { display: inline-block; padding: 4px 10px; background: #f0f0f0; color: #666; font-size: 11px; font-weight: 500; border-radius: 12px; }
  .artwork-actions { padding: 16px 24px; border-top: 1px solid #e8e8e8; display: flex; gap: 8px; }

  /* 업로드 */
  .upload-area { border: 2px dashed #e8e8e8; border-radius: 8px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
  .upload-area:hover { border-color: #c0392b; background: #fef8f7; }
  .upload-area.has-image { padding: 0; border: none; }
  .upload-area .upload-icon { font-size: 32px; color: #ccc; margin-bottom: 8px; }
  .upload-area .upload-text { font-size: 13px; color: #888; }
  .upload-area .upload-text strong { color: #c0392b; }
  .upload-preview { width: 100%; max-height: 300px; object-fit: contain; border-radius: 8px; background: #f0f0f0; }

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://gbjvkbtvcurgsonynokw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_llBLSGHCsOpdKanjt1v2Eg_aHOzIeJP';
const ADMIN_PASSWORD = 'hi5centum';
const AI_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/analyze-artwork`;

const { createClient } = window.supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// 상태
let students = [];
let attendanceMap = {};
let pendingChanges = {};
let currentTab = '';
let currentPage = 'attendance';     // attendance / gallery / students / teachers / records
let artworks = [];
let teachers = [];
let selectedTeacherId = null;
let selectedStudent = null;          // 갤러리에서 선택한 학생

// 유틸
function getTodayKey() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}
function setDate() {
  const days = ['일','월','화','수','목','금','토'];
  const now = new Date();
  document.getElementById('dateMain').textContent = `${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  document.getElementById('dateSub').textContent = `${now.getFullYear()}년`;
}
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
function setConnStatus(status) {
  const dot = document.getElementById('connDot');
  dot.className = 'conn-dot' + (status ? ' ' + status : '');
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
}
function getDefaultTeacher() {
  return teachers.find(t => t.is_default) || teachers[0] || null;
}

// ============ 화면 전환 ============
function showRoleScreen() {
  document.getElementById('roleScreen').style.display = '';
  document.getElementById('pwdScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('tabbar').classList.add('hidden');
  document.getElementById('saveBar').classList.add('hidden');
}
function showPwdScreen() {
  document.getElementById('roleScreen').style.display = 'none';
  document.getElementById('pwdScreen').style.display = '';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('tabbar').classList.add('hidden');
  document.getElementById('saveBar').classList.add('hidden');
  setTimeout(() => document.getElementById('pwdInput').focus(), 100);
}
function showMainApp() {
  document.getElementById('roleScreen').style.display = 'none';
  document.getElementById('pwdScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = '';
  document.getElementById('tabbar').classList.remove('hidden');
  loadData();
}

// 역할 카드 클릭
document.querySelectorAll('.role-card').forEach(card => {
  card.onclick = () => {
    if (card.classList.contains('disabled')) {
      showToast('아직 준비 중인 기능입니다');
      return;
    }
    const role = card.dataset.role;
    if (role === 'staff') showPwdScreen();
  };
});

// 비밀번호 화면
document.getElementById('pwdBackBtn').onclick = showRoleScreen;
const pwdInput = document.getElementById('pwdInput');
const pwdToggle = document.getElementById('pwdToggle');
pwdToggle.onclick = () => {
  const iconShow = document.getElementById('pwdIconShow');
  const iconHide = document.getElementById('pwdIconHide');
  if (pwdInput.type === 'password') {
    pwdInput.type = 'text';
    iconShow.style.display = 'none';
    iconHide.style.display = '';
  } else {
    pwdInput.type = 'password';
    iconShow.style.display = '';
    iconHide.style.display = 'none';
  }
  pwdInput.focus();
};
function tryAuth() {
  const errMsg = document.getElementById('pwdErrorMsg');
  if (pwdInput.value === ADMIN_PASSWORD) {
    errMsg.textContent = '';
    showMainApp();
    pwdInput.value = '';
    pwdInput.type = 'password';
  } else {
    pwdInput.classList.add('error');
    errMsg.textContent = '비밀번호가 틀렸습니다';
    setTimeout(() => pwdInput.classList.remove('error'), 500);
    pwdInput.value = '';
    pwdInput.focus();
  }
}
document.getElementById('pwdSubmit').onclick = tryAuth;
pwdInput.onkeydown = (e) => { if (e.key === 'Enter') tryAuth(); };

// 로그아웃
document.getElementById('logoutBtn').onclick = () => {
  if (Object.keys(pendingChanges).length > 0) {
    if (!confirm('저장하지 않은 변경사항이 있습니다. 정말 로그아웃 하시겠습니까?')) return;
  }
  pendingChanges = {};
  selectedStudent = null;
  currentPage = 'attendance';
  showRoleScreen();
};

// ============ 데이터 로드 ============
async function loadData() {
  try {
    setConnStatus('connecting');
    const { data: studentData, error: e1 } = await db.from('students').select('*').order('class_name').order('name');
    if (e1) throw e1;
    students = studentData || [];

    const today = getTodayKey();
    const { data: attData, error: e2 } = await db.from('attendance').select('*').eq('date', today);
    if (e2) throw e2;
    attendanceMap = {};
    (attData || []).forEach(a => { attendanceMap[a.student_id] = a.status; });

    const { data: artData, error: e3 } = await db.from('artworks').select('*').order('created_at', { ascending: false });
    if (e3) throw e3;
    artworks = artData || [];

    const { data: teacherData, error: e4 } = await db.from('teachers').select('*').order('is_default', { ascending: false }).order('id');
    if (e4) throw e4;
    teachers = teacherData || [];

    if (!selectedTeacherId || !teachers.find(t => t.id === selectedTeacherId)) {
      const def = getDefaultTeacher();
      selectedTeacherId = def ? def.id : null;
    }

    setConnStatus('');
    renderPage();
  } catch (err) {
    console.error(err);
    setConnStatus('error');
    document.getElementById('content').innerHTML = `<div class="error-screen"><strong>⚠️ 데이터베이스 연결 실패</strong>${escapeHtml(err.message || err)}</div>`;
  }
}

// ============ 탭바 클릭 ============
document.querySelectorAll('.tabbar-btn').forEach(btn => {
  btn.onclick = () => {
    if (currentPage === 'attendance' && Object.keys(pendingChanges).length > 0) {
      if (!confirm('저장하지 않은 출결 변경사항이 있습니다. 이동하시겠습니까?')) return;
      pendingChanges = {};
    }
    currentPage = btn.dataset.page;
    selectedStudent = null;
    document.querySelectorAll('.tabbar-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderPage();
  };
});

// ============ 페이지 렌더링 ============
function renderPage() {
  const saveBar = document.getElementById('saveBar');
  const app = document.getElementById('mainApp');
  
  // 저장 바 표시 여부
  if (currentPage === 'attendance') {
    saveBar.classList.remove('hidden');
    app.classList.add('with-savebar');
  } else {
    saveBar.classList.add('hidden');
    app.classList.remove('with-savebar');
  }

  if (currentPage === 'attendance') renderAttendancePage();
  else if (currentPage === 'gallery') renderGalleryPage();
  else if (currentPage === 'students') renderStudentsPage();
  else if (currentPage === 'teachers') renderTeachersPage();
  else if (currentPage === 'records') renderRecordsPage();
}

// ============ [출결 페이지] ============
function renderAttendancePage() {
  const total = students.length;
  let present = 0, absent = 0;
  students.forEach(s => {
    const status = pendingChanges.hasOwnProperty(s.id) ? pendingChanges[s.id] : attendanceMap[s.id];
    if (status === 'present') present++;
    if (status === 'absent') absent++;
  });

  const classes = [...new Set(students.map(s => s.class_name))];
  if (!currentTab && classes.length > 0) currentTab = classes[0];
  if (currentTab && !classes.includes(currentTab) && classes.length > 0) currentTab = classes[0];

  let html = `
    <div class="stats-and-tabs-wrap">
      <div class="stats">
        <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">전체</div></div>
        <div class="stat"><div class="stat-num green">${present}</div><div class="stat-label">출석</div></div>
        <div class="stat"><div class="stat-num red">${absent}</div><div class="stat-label">결석</div></div>
      </div>
    </div>`;

  if (classes.length > 0) {
    html += `<div class="tabs">${classes.map(c => `<div class="tab ${c === currentTab ? 'active' : ''}" data-class="${escapeHtml(c)}">${escapeHtml(c)}</div>`).join('')}</div>`;
  }

  if (students.length === 0) {
    html += '<div class="empty-state"><div class="big-icon">👥</div>등록된 학생이 없습니다.<br>[학생] 탭에서 학생을 추가해주세요.</div>';
  } else {
    const filtered = students.filter(s => s.class_name === currentTab);
    if (filtered.length === 0) {
      html += '<div class="empty-state">이 반에 학생이 없습니다.</div>';
    } else {
      html += '<div class="student-list">';
      filtered.forEach(s => {
        const status = pendingChanges.hasOwnProperty(s.id) ? pendingChanges[s.id] : attendanceMap[s.id];
        html += `
          <div class="student${status ? ' '+status : ''}">
            <div class="avatar">${escapeHtml(s.name.charAt(0))}</div>
            <div class="student-info">
              <div class="student-name">${escapeHtml(s.name)}</div>
              <div class="student-meta">${escapeHtml(s.grade || '')} ${s.school ? '· '+escapeHtml(s.school) : ''}</div>
            </div>
            <div class="actions">
              <button class="btn present-btn ${status === 'present' ? 'active' : ''}" data-id="${s.id}" data-action="present">출석</button>
              <button class="btn absent-btn ${status === 'absent' ? 'active' : ''}" data-id="${s.id}" data-action="absent">결석</button>
            </div>
          </div>`;
      });
      html += '</div>';
    }
  }
  document.getElementById('content').innerHTML = html;

  // 반 탭 클릭
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => { currentTab = tab.dataset.class; renderAttendancePage(); };
  });

  // 출결 버튼
  document.querySelectorAll('.btn[data-action]').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.id);
      const action = btn.dataset.action;
      const current = pendingChanges.hasOwnProperty(id) ? pendingChanges[id] : attendanceMap[id];
      pendingChanges[id] = (current === action) ? null : action;
      renderAttendancePage();
      updateSaveButton();
    };
  });

  updateSaveButton();
}

function updateSaveButton() {
  const count = Object.keys(pendingChanges).length;
  document.getElementById('changeCount').textContent = count;
  document.getElementById('saveBtn').disabled = (count === 0);
}

document.getElementById('saveBtn').onclick = async () => {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  try {
    const today = getTodayKey();
    const upserts = [];
    const deletes = [];
    Object.entries(pendingChanges).forEach(([id, status]) => {
      if (status === null) deletes.push(parseInt(id));
      else upserts.push({ student_id: parseInt(id), date: today, status });
    });
    if (upserts.length > 0) {
      const { error } = await db.from('attendance').upsert(upserts, { onConflict: 'student_id,date' });
      if (error) throw error;
    }
    if (deletes.length > 0) {
      const { error } = await db.from('attendance').delete().eq('date', today).in('student_id', deletes);
      if (error) throw error;
    }
    Object.entries(pendingChanges).forEach(([id, status]) => {
      if (status === null) delete attendanceMap[id];
      else attendanceMap[id] = status;
    });
    pendingChanges = {};
    showToast('✓ 저장되었습니다');
  } catch (err) {
    console.error(err);
    showToast('저장 실패: ' + (err.message || err));
  } finally {
    btn.textContent = '저장하기';
    if (currentPage === 'attendance') renderAttendancePage();
  }
};

// ============ [갤러리 페이지] ============
function renderGalleryPage() {
  if (selectedStudent) { renderStudentGallery(selectedStudent); return; }

  const content = document.getElementById('content');
  let html = `<div class="page-title-row"><div class="page-title">🎨 학생 갤러리</div></div>`;

  if (students.length === 0) {

    content.innerHTML = html;
    return;
  }

  const studentArtworkMap = {};
  artworks.forEach(a => {
    if (!studentArtworkMap[a.student_id]) studentArtworkMap[a.student_id] = [];
    studentArtworkMap[a.student_id].push(a);
  });
  const classes = [...new Set(students.map(s => s.class_name))];

  classes.forEach(cls => {
    const clsStudents = students.filter(s => s.class_name === cls);
    html += `<div class="gallery-class-section"><div class="class-header">${escapeHtml(cls)}</div><div class="gallery-students">`;
    clsStudents.forEach(s => {
      const studentArts = studentArtworkMap[s.id] || [];
      const thumb = studentArts[0];
      html += `
        <div class="gallery-student-card" data-student-id="${s.id}">
          <div class="gallery-student-thumb">

          </div>

    html += `</div></div>`;

  content.innerHTML = html;

  content.querySelectorAll('.gallery-student-card').forEach(card => {
    card.onclick = () => {
      const id = parseInt(card.dataset.studentId);
      selectedStudent = students.find(s => s.id === id);

function showArtworkDetail(artwork) {
  const student = students.find(s => s.id === artwork.student_id);
  const teacher = artwork.teacher_id ? teachers.find(t => t.id === artwork.teacher_id) : null;
  const modal = document.getElementById('artworkModal');
  const body = document.getElementById('artworkModalBody');
  body.innerHTML = `
    <div class="artwork-detail">
      <img class="artwork-image" src="${escapeHtml(artwork.image_url)}" alt="${escapeHtml(artwork.title || '')}" />
      <div class="artwork-info">
        ${artwork.title ? `<div class="artwork-title">${escapeHtml(artwork.title)}</div>` : ''}
        ${student ? `<div class="artwork-student">${escapeHtml(student.name)} · ${escapeHtml(student.class_name)}</div>` : ''}
        <div class="artwork-meta-row">
          ${artwork.subject ? `📚 ${escapeHtml(artwork.subject)} · ` : ''}
          📅 ${formatDate(artwork.created_at)}
          ${teacher ? ` · ✍️ ${escapeHtml(teacher.name)}쌤` : ''}
        </div>
        ${artwork.description ? `<div class="artwork-description">${escapeHtml(artwork.description)}</div>` : ''}
        ${artwork.tags && artwork.tags.length > 0 ? `<div class="artwork-tags">${artwork.tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
      </div>
      <div class="artwork-actions">
        <button class="form-btn" id="artworkEdit">수정</button>
        <button class="form-btn" id="artworkDelete" style="color:#c0392b;border-color:#c0392b;">삭제</button>
      </div>
    </div>`;
  modal.classList.add('show');
  document.getElementById('artworkEdit').onclick = () => {
    modal.classList.remove('show');

  };

    if (!confirm('이 작품을 삭제하시겠습니까?')) return;

  };
}
document.getElementById('artworkModalClose').onclick = () => document.getElementById('artworkModal').classList.remove('show');

function showStudentForm(student = null) {
  const isEdit = !!student;
  const classes = [...new Set(students.map(s => s.class_name))];
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="page-title-row"><div class="page-title">${isEdit ? '학생 수정' : '학생 추가'}</div></div>
    <div style="padding:24px;">
      <div class="form-group">
        <label class="form-label">이름 *</label>
        <input type="text" class="form-input" id="fName" value="${student ? escapeHtml(student.name) : ''}" placeholder="학생 이름" />
      </div>
      <div class="form-group">
        <label class="form-label">반 *</label>
        <select class="form-select" id="fClass">
          ${classes.length === 0 ? '' : classes.map(c => `<option value="${escapeHtml(c)}" ${student && student.class_name === c ? 'selected':''}>${escapeHtml(c)}</option>`).join('')}
          <option value="__new__">+ 새 반 만들기</option>
        </select>
        <input type="text" class="form-input" id="fNewClass" placeholder="새 반 이름" style="display:${classes.length === 0 ? 'block' : 'none'};margin-top:8px;" />
      </div>
      <div class="form-group">
        <label class="form-label">학년</label>
        <input type="text" class="form-input" id="fGrade" value="${student ? escapeHtml(student.grade || '') : ''}" placeholder="예: 고3" />
      </div>
      <div class="form-group">
        <label class="form-label">학교</label>
        <input type="text" class="form-input" id="fSchool" value="${student ? escapeHtml(student.school || '') : ''}" placeholder="예: 센텀고" />
      </div>
      <div class="form-buttons">
        <button class="form-btn" id="fCancel">취소</button>
        <button class="form-btn primary" id="fSave">${isEdit ? '수정' : '추가'}</button>
      </div>
    </div>`;
  const classSelect = document.getElementById('fClass');
  const newClassInput = document.getElementById('fNewClass');
  if (classes.length === 0) classSelect.value = '__new__';
  classSelect.onchange = () => {
    if (classSelect.value === '__new__') { newClassInput.style.display = 'block'; newClassInput.focus(); }
    else newClassInput.style.display = 'none';
  };
  document.getElementById('fCancel').onclick = renderStudentsPage;
  document.getElementById('fSave').onclick = async () => {
    const name = document.getElementById('fName').value.trim();
    let className = classSelect.value;
    if (className === '__new__') className = newClassInput.value.trim();
    const grade = document.getElementById('fGrade').value.trim();
    const school = document.getElementById('fSchool').value.trim();
    if (!name) { showToast('이름을 입력해주세요'); return; }
    if (!className) { showToast('반을 선택해주세요'); return; }
    try {
      if (isEdit) {
        const { error } = await db.from('students').update({ name, class_name: className, grade, school }).eq('id', student.id);
        if (error) throw error;
        showToast('✓ 수정되었습니다');
      } else {
        const { error } = await db.from('students').insert({ name, class_name: className, grade, school });
        if (error) throw error;
        showToast('✓ 추가되었습니다');
      }
      await loadData();
    } catch (err) {
      console.error(err);
      showToast('실패: ' + (err.message || err));
    }
  };
}

async function deleteStudent(student) {
  if (!confirm(`'${student.name}' 학생을 삭제하시겠습니까?\n관련 출결 기록과 작품도 모두 삭제됩니다.`)) return;
  try {
    const { error } = await db.from('students').delete().eq('id', student.id);
    if (error) throw error;
    showToast('✓ 삭제되었습니다');
    await loadData();
  } catch (err) {
    console.error(err);
    showToast('삭제 실패: ' + (err.message || err));
  }
}

async function renameClass(oldName) {
  const newName = prompt(`'${oldName}' 의 새 이름을 입력하세요:`, oldName);
  if (!newName || newName === oldName) return;
  if (!newName.trim()) { showToast('이름을 입력해주세요'); return; }
  try {
    const { error } = await db.from('students').update({ class_name: newName.trim() }).eq('class_name', oldName);
    if (error) throw error;
    showToast('✓ 반 이름이 변경되었습니다');
    if (currentTab === oldName) currentTab = newName.trim();
    await loadData();
  } catch (err) {
    console.error(err);
    showToast('변경 실패: ' + (err.message || err));
  }
}

function showTeacherForm(teacher = null) {
  const isEdit = !!teacher;
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="page-title-row"><div class="page-title">${isEdit ? '강사 수정' : '강사 추가'}</div></div>

      <div class="form-group">

            <div class="upload-icon">👤</div>
            <div class="upload-text">탭해서 프로필 사진 선택<br><span style="font-size:11px;">(선택사항)</span></div>

        <input type="file" id="fTeacherAvatar" accept="image/*" style="display:none;" />
      </div>
      <div class="form-group">
        <label class="form-label">이름 *</label>
        <input type="text" class="form-input" id="fTeacherName" value="${teacher ? escapeHtml(teacher.name) : ''}" placeholder="예: 경학" />
        <div style="font-size:11px;color:#888;margin-top:4px;">이름 뒤에 자동으로 "쌤"이 붙습니다 (예: 경학쌤)</div>
      </div>
      <div class="form-group">
        <label class="form-label">AI 톤 스타일 *</label>
        <textarea class="form-textarea" id="fTeacherTone" placeholder="예: 다정하지만 담백하게, 마무리는 따뜻한 응원으로">${teacher ? escapeHtml(teacher.ai_tone_style || '') : ''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">자주 쓰는 말투/특징<span class="form-label-hint">(선택)</span></label>

      </div>
      <div class="form-group">
        <label class="form-label">샘플 코멘트 ⭐<span class="form-label-hint">(강추)</span></label>

        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">

        <button class="form-btn" id="fCancel">취소</button>

    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('이미지 파일만 업로드 가능합니다'); return; }
    if (file.size > 5 * 1024 * 1024) { showToast('파일 크기는 5MB 이하여야 합니다'); return; }
    selectedAvatarFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => {
      avatarArea.classList.add('has-image');
      avatarArea.innerHTML = `<img class="upload-preview" src="${ev.target.result}" style="max-height:200px;" />`;

          const oldPath = teacher.avatar_url.split('/artworks/').pop();
          if (oldPath) await db.storage.from('artworks').remove([oldPath]).catch(()=>{});
        }
      }

      const payload = { name, ai_tone_style, writing_style, sample_comment, avatar_url, is_default };

      if (is_default) {
        await db.from('teachers').update({ is_default: false }).neq('id', isEdit ? teacher.id : -1);
      }

      if (isEdit) {
        const { error } = await db.from('teachers').update(payload).eq('id', teacher.id);
        if (error) throw error;
        showToast('✓ 수정되었습니다');
      } else {
        const { error } = await db.from('teachers').insert(payload);
        if (error) throw error;
        showToast('✓ 추가되었습니다');
      }
      await loadData();
    } catch (err) {
      console.error(err);
      showToast('실패: ' + (err.message || err));
      saveBtn.disabled = false;
      saveBtn.textContent = isEdit ? '수정' : '추가';
    }
  };
}

async function deleteTeacher(teacher) {
  if (teachers.length <= 1) {
    showToast('최소 1명의 강사는 등록되어 있어야 합니다');
    return;
  }
  if (!confirm(`'${teacher.name}쌤'을 삭제하시겠습니까?`)) return;
  try {
    if (teacher.avatar_url) {
      const path = teacher.avatar_url.split('/artworks/').pop();
      if (path) await db.storage.from('artworks').remove([path]).catch(()=>{});
    }
    const { error } = await db.from('teachers').delete().eq('id', teacher.id);
    if (error) throw error;
    showToast('✓ 삭제되었습니다');
    await loadData();
  } catch (err) {
    console.error(err);
    showToast('삭제 실패: ' + (err.message || err));
  }
}

// ============ 작품 폼 (갤러리에서 호출) ============
function showArtworkForm(artwork = null, presetStudentId = null) {
  const isEdit = !!artwork;
  const content = document.getElementById('content');

  if (students.length === 0) {
    content.innerHTML = '<div class="page-title-row"><div class="page-title">작품 업로드</div></div><div class="empty-state">먼저 학생을 등록해주세요.</div>';
    return;
  }
  if (teachers.length === 0) {
    content.innerHTML = `
      <div class="page-title-row"><div class="page-title">작품 업로드</div></div>
      <div class="empty-state">
        <div class="big-icon">👨‍🏫</div>
        먼저 강사를 등록해주세요.<br>
        <button class="page-action-btn" style="margin-top:16px;" id="goTeacherTab">강사 등록하러 가기</button>
      </div>`;
    document.getElementById('goTeacherTab').onclick = () => {
      currentPage = 'teachers';
      document.querySelectorAll('.tabbar-btn').forEach(b => b.classList.toggle('active', b.dataset.page === 'teachers'));
      renderPage();
    };
    return;
  }

  // 학생 자동 선택: 수정 > preset > 첫 번째
  const formStudentId = isEdit ? artwork.student_id : (presetStudentId || students[0].id);
  const formTeacherId = isEdit && artwork.teacher_id ? artwork.teacher_id : (selectedTeacherId || (getDefaultTeacher() && getDefaultTeacher().id));

  content.innerHTML = `
    <div class="page-title-row">
      <div class="page-title">${isEdit ? '작품 수정' : '작품 추가'}</div>
    </div>
    <div style="padding:24px;">
      <div class="form-group">
        <label class="form-label">이미지 ${isEdit ? '' : '*'}</label>
        <div class="upload-area ${isEdit ? 'has-image' : ''}" id="uploadArea">
          ${isEdit ? `<img class="upload-preview" src="${escapeHtml(artwork.image_url)}" />` : `
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">이미지를 선택하거나<br><strong>여기를 탭</strong>해서 업로드</div>
          `}
        </div>
        <input type="file" id="fImage" accept="image/*" style="display:none;" />
        ${isEdit ? '<div style="font-size:11px;color:#888;margin-top:6px;">※ 이미지를 변경하려면 위 이미지를 탭하세요</div>' : ''}
      </div>

      <div class="form-group">
        <label class="form-label">분석할 강사 *</label>
        <select class="form-select" id="fArtworkTeacher">
          ${teachers.map(t => `<option value="${t.id}" ${t.id === formTeacherId ? 'selected' : ''}>${escapeHtml(t.name)}쌤${t.is_default ? ' (기본)' : ''}</option>`).join('')}
        </select>
        <div style="font-size:11px;color:#888;margin-top:4px;">이 선생님의 톤으로 AI가 분석합니다</div>
      </div>

      <button class="ai-analyze-btn" id="aiAnalyzeBtn" type="button" disabled>
        <span class="ai-icon">🤖</span>
        <span id="aiAnalyzeBtnText">AI로 분석하기</span>
      </button>
      <div class="ai-hint">이미지 선택 후 클릭하면 <strong>선택한 강사 톤으로</strong> AI가 자동 작성합니다</div>

      <div class="form-group">
        <label class="form-label">학생 *</label>
        <select class="form-select" id="fStudent">
          ${students.map(s => `<option value="${s.id}" ${s.id === formStudentId ? 'selected':''}>${escapeHtml(s.name)} (${escapeHtml(s.class_name)})</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">제목</label>
        <input type="text" class="form-input" id="fTitle" value="${artwork ? escapeHtml(artwork.title || '') : ''}" placeholder="예: 정물 연구 - 사과와 항아리" />
      </div>
      <div class="form-group">
        <label class="form-label">수업 주제</label>
        <input type="text" class="form-input" id="fSubject" value="${artwork ? escapeHtml(artwork.subject || '') : ''}" placeholder="예: 기초 디자인, 발상과 표현" />
      </div>
      <div class="form-group">
        <label class="form-label">설명 / 코멘트</label>
        <textarea class="form-textarea" id="fDescription" placeholder="작품에 대한 설명이나 강사 코멘트를 입력하세요">${artwork ? escapeHtml(artwork.description || '') : ''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">태그 (쉼표로 구분)</label>
        <input type="text" class="form-input" id="fTags" value="${artwork && artwork.tags ? escapeHtml(artwork.tags.join(', ')) : ''}" placeholder="예: 우수작, 입시포트폴리오, 정물화" />
      </div>
      <div class="form-buttons">
        <button class="form-btn" id="fCancel">취소</button>
        <button class="form-btn primary" id="fSave">${isEdit ? '수정' : '업로드'}</button>
      </div>
    </div>`;

  const uploadArea = document.getElementById('uploadArea');
  const fImage = document.getElementById('fImage');
  const aiBtn = document.getElementById('aiAnalyzeBtn');
  let selectedFile = null;
  let imageBase64 = null;
  let imageMimeType = null;

  if (isEdit && artwork.image_url) {
    aiBtn.disabled = false;
    fetch(artwork.image_url).then(r => r.blob()).then(blob => {
      imageMimeType = blob.type;
      const reader = new FileReader();
      reader.onload = e => { imageBase64 = e.target.result.split(',')[1]; };
      reader.readAsDataURL(blob);
    }).catch(() => {});
  }

  uploadArea.onclick = () => fImage.click();
  fImage.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('이미지 파일만 업로드 가능합니다'); return; }
    if (file.size > 10 * 1024 * 1024) { showToast('파일 크기는 10MB 이하여야 합니다'); return; }
    selectedFile = file;
    imageMimeType = file.type;
    const reader = new FileReader();
    reader.onload = (ev) => {
      imageBase64 = ev.target.result.split(',')[1];
      uploadArea.classList.add('has-image');
      uploadArea.innerHTML = `<img class="upload-preview" src="${ev.target.result}" />`;
      aiBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  };

  document.getElementById('fArtworkTeacher').onchange = (e) => {
    selectedTeacherId = parseInt(e.target.value);
  };

  aiBtn.onclick = async () => {
    if (!imageBase64) { showToast('이미지를 먼저 선택해주세요'); return; }
    aiBtn.disabled = true;
    aiBtn.innerHTML = `<span class="ai-spinner"></span><span>AI 분석 중... (5~10초)</span>`;
    try {
      const studentId = parseInt(document.getElementById('fStudent').value);
      const teacherId = parseInt(document.getElementById('fArtworkTeacher').value);
      const student = students.find(s => s.id === studentId);
      const teacher = teachers.find(t => t.id === teacherId);

      const response = await fetch(AI_FUNCTION_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify({
          imageBase64,
          mimeType: imageMimeType,
          studentInfo: student ? { name: student.name, grade: student.grade, school: student.school, class_name: student.class_name } : null,
          teacherInfo: teacher ? {
            name: teacher.name,
            ai_tone_style: teacher.ai_tone_style,
            writing_style: teacher.writing_style,
            sample_comment: teacher.sample_comment
          } : null
        })
      });
      const data = await response.json();
      if (!response.ok || data.error) throw new Error(data.error || `HTTP ${response.status}`);

      if (data.title) document.getElementById('fTitle').value = data.title;
      if (data.subject) document.getElementById('fSubject').value = data.subject;
      if (data.description) document.getElementById('fDescription').value = data.description;
      if (data.tags && data.tags.length > 0) document.getElementById('fTags').value = data.tags.join(', ');

      const teacherName = teacher ? `${teacher.name}쌤` : 'AI';
      showToast(`✨ ${teacherName} 톤으로 분석 완료!`);
    } catch (err) {
      console.error('AI analyze error:', err);
      showToast('AI 분석 실패: ' + (err.message || err));
    } finally {
      aiBtn.disabled = false;
      aiBtn.innerHTML = `<span class="ai-icon">🤖</span><span>AI로 분석하기</span>`;
    }
  };

  document.getElementById('fCancel').onclick = () => {
    if (selectedStudent) renderStudentGallery(selectedStudent);
    else renderGalleryPage();
  };

  document.getElementById('fSave').onclick = async () => {
    const studentId = parseInt(document.getElementById('fStudent').value);
    const teacherId = parseInt(document.getElementById('fArtworkTeacher').value);
    const title = document.getElementById('fTitle').value.trim();
    const subject = document.getElementById('fSubject').value.trim();
    const description = document.getElementById('fDescription').value.trim();
    const tagsRaw = document.getElementById('fTags').value.trim();
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];

    if (!isEdit && !selectedFile) { showToast('이미지를 선택해주세요'); return; }
    if (!studentId) { showToast('학생을 선택해주세요'); return; }

    const saveBtn = document.getElementById('fSave');
    saveBtn.disabled = true;
    saveBtn.textContent = '업로드 중...';

    try {
      let imageUrl = artwork ? artwork.image_url : null;
      if (selectedFile) {
        const ext = selectedFile.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${ext}`;
        const { error: uploadError } = await db.storage.from('artworks').upload(fileName, selectedFile, { cacheControl: '3600', upsert: false });
        if (uploadError) throw uploadError;
        const { data: urlData } = db.storage.from('artworks').getPublicUrl(fileName);
        imageUrl = urlData.publicUrl;
        if (isEdit && artwork.image_url) {
          const oldPath = artwork.image_url.split('/artworks/').pop();
          if (oldPath) await db.storage.from('artworks').remove([oldPath]).catch(()=>{});
        }
      }
      const payload = {
        student_id: studentId,
        teacher_id: teacherId || null,
        image_url: imageUrl,
        title: title || null,
        subject: subject || null,
        description: description || null,
        tags: tags.length > 0 ? tags : null
      };
      if (isEdit) {
        const { error } = await db.from('artworks').update(payload).eq('id', artwork.id);
        if (error) throw error;
        showToast('✓ 작품이 수정되었습니다');
      } else {
        const { error } = await db.from('artworks').insert(payload);
        if (error) throw error;
        showToast('✓ 작품이 업로드되었습니다');
      }
      // 업로드한 학생의 갤러리로 이동
      const uploadedStudent = students.find(s => s.id === studentId);
      await loadData();
      if (uploadedStudent) {
        selectedStudent = uploadedStudent;
        currentPage = 'gallery';
        document.querySelectorAll('.tabbar-btn').forEach(b => b.classList.toggle('active', b.dataset.page === 'gallery'));
      }
      renderPage();
    } catch (err) {
      console.error(err);
      showToast('실패: ' + (err.message || err));
      saveBtn.disabled = false;
      saveBtn.textContent = isEdit ? '수정' : '업로드';
    }
  };
}

async function deleteArtwork(artwork) {
  try {
    if (artwork.image_url) {
      const path = artwork.image_url.split('/artworks/').pop();
      if (path) await db.storage.from('artworks').remove([path]).catch(()=>{});
    }
    const { error } = await db.from('artworks').delete().eq('id', artwork.id);
    if (error) throw error;
    showToast('✓ 삭제되었습니다');
    await loadData();
    renderPage();
  } catch (err) {
    console.error(err);
    showToast('삭제 실패: ' + (err.message || err));
  }
}

// ============ [출결기록 페이지] ============
function renderRecordsPage() {
  const content = document.getElementById('content');
  const today = getTodayKey();
  content.innerHTML = `
    <div class="page-title-row"><div class="page-title">📊 출결 기록</div></div>
    <div class="record-controls">
      <label class="form-label">날짜 선택</label>
      <input type="date" class="date-input" id="recordDate" value="${today}" />
      <div class="record-summary" id="recordSummary"></div>
    </div>
    <div id="recordList"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>`;
  const dateInput = document.getElementById('recordDate');
  dateInput.onchange = () => loadRecords(dateInput.value);
  loadRecords(today);
}

async function loadRecords(date) {
  const summary = document.getElementById('recordSummary');
  const list = document.getElementById('recordList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  try {
    const { data: records, error } = await db.from('attendance').select('*').eq('date', date);
    if (error) throw error;
    const recordMap = {};
    (records || []).forEach(r => { recordMap[r.student_id] = r.status; });
    let present = 0, absent = 0, none = 0;
    students.forEach(s => {
      const status = recordMap[s.id];
      if (status === 'present') present++;
      else if (status === 'absent') absent++;
      else none++;
    });
    summary.innerHTML = `
      <div class="summary-card"><div class="summary-num green">${present}</div><div class="summary-label">출석</div></div>
      <div class="summary-card"><div class="summary-num red">${absent}</div><div class="summary-label">결석</div></div>
      <div class="summary-card"><div class="summary-num gray">${none}</div><div class="summary-label">미체크</div></div>`;
    if (students.length === 0) { list.innerHTML = '<div class="empty-state">학생이 없습니다.</div>'; return; }
    const classes = [...new Set(students.map(s => s.class_name))];
    let html = '';
    classes.forEach(cls => {
      const clsStudents = students.filter(s => s.class_name === cls);
      html += `<div class="class-header">${escapeHtml(cls)}</div>`;
      clsStudents.forEach(s => {
        const status = recordMap[s.id];
        const statusHtml = status === 'present' ? '<span class="record-status present">출석</span>' : status === 'absent' ? '<span class="record-status absent">결석</span>' : '<span class="record-status none">미체크</span>';
        html += `
          <div class="list-item">
            <div class="avatar" style="width:36px;height:36px;font-size:13px;">${escapeHtml(s.name.charAt(0))}</div>
            <div class="list-item-info">
              <div class="list-item-name">${escapeHtml(s.name)}</div>
              <div class="list-item-meta">${escapeHtml(s.grade || '')} ${s.school ? '· '+escapeHtml(s.school) : ''}</div>
            </div>
            <div>${statusHtml}</div>
          </div>`;
      });
    });
    list.innerHTML = html;
  } catch (err) {
    console.error(err);
    list.innerHTML = `<div class="error-screen"><strong>⚠️ 불러오기 실패</strong>${escapeHtml(err.message || err)}</div>`;
  }
}
