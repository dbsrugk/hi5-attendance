        <button class="form-btn primary" id="ctSave">${isEdit ? '수정' : '추가'}</button>
      </div>
    </div>
  `;

  document.getElementById('ctCancel').onclick = () => {
    currentPage = 'attendance';
    currentSubPage = 'classtimes';
    renderPage();
  };

  document.getElementById('ctSave').onclick = async () => {
    const label = document.getElementById('ctLabel').value.trim();
    const order = parseInt(document.getElementById('ctOrder').value) || 0;
    if (!label) { showToast('시간 라벨을 입력해주세요'); return; }

    const saveBtn = document.getElementById('ctSave');
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';

    try {
      if (isEdit) {
        const isActive = document.getElementById('ctActive').value === 'true';
        const { error } = await db.from('class_times').update({
          time_label: label,
          display_order: order,
          is_active: isActive
        }).eq('id', ct.id);
        if (error) throw error;
        showToast('✓ 수정되었습니다');
      } else {
        const { error } = await db.from('class_times').insert({
          time_label: label,
          display_order: order,
          is_active: true
        });
        if (error) throw error;
        showToast('✓ 추가되었습니다');
      }
      await loadData();
      currentPage = 'attendance';
      currentSubPage = 'classtimes';
      renderPage();
    } catch (err) {
      console.error(err);
      // 중복 라벨 에러 친절하게 안내
      if (err.message && err.message.includes('duplicate')) {
        showToast('이미 같은 라벨이 등록되어 있습니다');
      } else {
        showToast('저장 실패: ' + (err.message || err));
      }
      saveBtn.disabled = false;
      saveBtn.textContent = isEdit ? '수정' : '추가';
    }
  };
}

async function deleteClassTime(ct) {
  try {
    // student_schedules는 ON DELETE CASCADE로 자동 삭제됨
    const { error } = await db.from('class_times').delete().eq('id', ct.id);

// ============ [출결기록 페이지] ============
let recordsMode = 'daily';      // 'daily' | 'monthly'
let monthlyPreset = 'current';  // 'current' | 'last' | 'custom'
let monthlyClassFilter = 'all'; // 'all' | 클래스명
let monthlyStartDate = '';
let monthlyEndDate = '';

// 일별 보기 — 현재 선택된 날짜 (탭 이동·재진입 시에도 유지)
let recordSelectedDate = '';

// 'YYYY-MM-DD' 더하기 N일 (음수도 가능)
function shiftDateKey(dateKey, days) {
  const [y, m, d] = dateKey.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + days);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

// 'YYYY-MM-DD' → '2026년 5월 10일 (일)'
function formatDateLong(dateKey) {
  const [y, m, d] = dateKey.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const dayNames = ['일','월','화','수','목','금','토'];
  return `${y}년 ${m}월 ${d}일 (${dayNames[dt.getDay()]})`;
}

function renderRecordsPage() {
  const content = document.getElementById('content');
  content.innerHTML = `
    ${renderSubtabsHTML(ATTENDANCE_SUBTABS, 'records')}
    <div class="page-title-row"><div class="page-title">📊 출결 기록</div></div>
    <div class="records-mode-toggle">

      <button class="records-mode-btn ${recordsMode === 'monthly' ? 'active' : ''}" data-mode="monthly">📈 월별</button>
    </div>
    <div id="recordsBody"></div>`;

// ============ 일별 보기 ============
function renderDailyRecords() {
  const today = getTodayKey();
  // 처음 진입이거나 이전 선택값이 비었으면 오늘로
  if (!recordSelectedDate) recordSelectedDate = today;

  document.getElementById('recordsBody').innerHTML = `
    <div class="record-controls">
      <div class="date-nav">
        <button class="date-nav-arrow" id="datePrevBtn" title="하루 전">‹</button>
        <label class="date-nav-display" title="날짜 선택">
          <span class="date-nav-text" id="dateNavText"></span>
          <span class="date-nav-cal-icon">📅</span>
          <input type="date" id="recordDate" value="${recordSelectedDate}" max="${today}" />
        </label>
        <button class="date-nav-arrow" id="dateNextBtn" title="하루 후">›</button>
      </div>
      <button class="date-nav-today-btn" id="dateTodayBtn" style="display:none;">↺ 오늘로</button>
      <div class="record-summary" id="recordSummary"></div>
    </div>
    <div id="recordList"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>`;

  // 화살표/날짜 표시 업데이트 + 데이터 로드
  function applyDate(newDate) {
    // 미래 차단
    if (newDate > today) return;
    recordSelectedDate = newDate;
    updateDateUI();
    loadDailyRecords(recordSelectedDate);
  }

  function updateDateUI() {
    const isToday = recordSelectedDate === today;
    const text = document.getElementById('dateNavText');
    text.textContent = formatDateLong(recordSelectedDate);
    text.classList.toggle('is-today', isToday);
    // 다음 날 화살표는 오늘이면 비활성
    document.getElementById('dateNextBtn').disabled = isToday;
    // [오늘로] 버튼은 오늘이 아닐 때만
    document.getElementById('dateTodayBtn').style.display = isToday ? 'none' : 'block';
    // <input type="date">의 value도 동기화 (사용자가 화살표로 이동했을 때)
    const dateInput = document.getElementById('recordDate');
    if (dateInput.value !== recordSelectedDate) dateInput.value = recordSelectedDate;
  }

  document.getElementById('datePrevBtn').onclick = () => {
    applyDate(shiftDateKey(recordSelectedDate, -1));
  };
  document.getElementById('dateNextBtn').onclick = () => {
    applyDate(shiftDateKey(recordSelectedDate, 1));
  };
  document.getElementById('dateTodayBtn').onclick = () => {
    applyDate(today);
  };
  document.getElementById('recordDate').onchange = (e) => {
    if (e.target.value) applyDate(e.target.value);
  };

  // 초기 렌더
  updateDateUI();
  loadDailyRecords(recordSelectedDate);
}

async function loadDailyRecords(date) {
  const summary = document.getElementById('recordSummary');
  const list = document.getElementById('recordList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  try {
    const { data: records, error } = await db.from('attendance').select('*').eq('date', date);
    if (error) throw error;
    const recordMap = {};
    (records || []).forEach(r => { recordMap[r.student_id] = r.status; });
    let present = 0, absent = 0;
    students.forEach(s => {
      const status = recordMap[s.id];
      if (status === 'present') present++;
      else if (status === 'absent') absent++;
    });
    const total = present + absent;
    summary.innerHTML = `
      <div class="summary-card"><div class="summary-num">${total}</div><div class="summary-label">총원</div></div>
      <div class="summary-card"><div class="summary-num green">${present}</div><div class="summary-label">출석</div></div>
      <div class="summary-card"><div class="summary-num red">${absent}</div><div class="summary-label">결석</div></div>`;
    if (students.length === 0) { list.innerHTML = '<div class="empty-state">학생이 없습니다.</div>'; return; }
    if (total === 0) {
      list.innerHTML = '<div class="empty-state">이 날짜에 출결이 체크된 학생이 없습니다.</div>';
      return;
    }
    // 출석/결석 체크된 학생만 표시
    const classes = [...new Set(students.map(s => s.class_name))];
    let html = '';
    classes.forEach(cls => {
      const clsStudents = students.filter(s => {
        const status = recordMap[s.id];
        return s.class_name === cls && (status === 'present' || status === 'absent');
      });
      if (clsStudents.length === 0) return; // 이 반에 체크된 학생 없으면 반 헤더도 숨김

      // 반별 통계
      const clsPresent = clsStudents.filter(s => recordMap[s.id] === 'present').length;
      const clsAbsent = clsStudents.filter(s => recordMap[s.id] === 'absent').length;
      const clsTotal = clsPresent + clsAbsent;

      html += `
        <div class="class-header class-header-with-stats">
          <span class="cls-name">${escapeHtml(cls)}</span>
          <span class="cls-stats">총원 ${clsTotal} · 출석 ${clsPresent} · 결석 ${clsAbsent}</span>
        </div>`;
      clsStudents.forEach(s => {
        const status = recordMap[s.id];
        const statusHtml = status === 'present'
          ? '<span class="record-status present">출석</span>'
          : '<span class="record-status absent">결석</span>';
        html += `
          <div class="list-item">
            <div class="avatar" style="width:36px;height:36px;font-size:13px;">${escapeHtml(s.name.charAt(0))}</div>
            <div class="list-item-info">
              <div class="list-item-name">${escapeHtml(s.name)}</div>
              <div class="list-item-meta">${escapeHtml(s.grade || '')} ${s.school ? '· '+escapeHtml(s.school) : ''}</div>
            </div>
            <div>${statusHtml}</div>
          </div>`;
      });
    });
    list.innerHTML = html;
  } catch (err) {
    console.error(err);
    list.innerHTML = `<div class="error-screen"><strong>⚠️ 불러오기 실패</strong>${escapeHtml(err.message || err)}</div>`;
  }
}

// ============ 월별 보기 ============
function getMonthRange(preset) {
  const now = new Date();
  let start, end;
  if (preset === 'current') {
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  } else if (preset === 'last') {
    start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    end = new Date(now.getFullYear(), now.getMonth(), 0);
  }
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return { start: fmt(start), end: fmt(end) };
}

function renderMonthlyRecords() {
  // 초기값 설정
  if (!monthlyStartDate || !monthlyEndDate) {
    const range = getMonthRange('current');
    monthlyStartDate = range.start;
    monthlyEndDate = range.end;
  }

  const classes = [...new Set(students.map(s => s.class_name))];

  document.getElementById('recordsBody').innerHTML = `
    <div class="filter-bar">
      <div class="preset-buttons">
        <button class="preset-btn ${monthlyPreset === 'current' ? 'active' : ''}" data-preset="current">이번 달</button>
        <button class="preset-btn ${monthlyPreset === 'last' ? 'active' : ''}" data-preset="last">지난 달</button>
        <button class="preset-btn ${monthlyPreset === 'custom' ? 'active' : ''}" data-preset="custom">커스텀</button>
      </div>
      <div class="custom-range ${monthlyPreset === 'custom' ? 'show' : ''}" id="customRange">
        <input type="date" class="filter-input" id="customStart" value="${monthlyStartDate}" />
        <span>~</span>
        <input type="date" class="filter-input" id="customEnd" value="${monthlyEndDate}" />
      </div>
      <div class="filter-row" style="margin-top:10px;">
        <span class="filter-label">반</span>
        <select class="filter-select" id="classFilter">
          <option value="all" ${monthlyClassFilter === 'all' ? 'selected' : ''}>전체 반</option>
          ${classes.map(c => `<option value="${escapeHtml(c)}" ${monthlyClassFilter === c ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}
        </select>
      </div>
      <button class="download-btn" id="downloadBtn">
        <span class="download-icon">📥</span>
        <span>엑셀로 다운로드</span>
      </button>
    </div>
    <div id="monthlyContent"><div class="loading"><div class="spinner"></div>통계 계산 중...</div></div>`;

  // 프리셋 버튼
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.onclick = () => {
      monthlyPreset = btn.dataset.preset;
      if (monthlyPreset !== 'custom') {
        const range = getMonthRange(monthlyPreset);
        monthlyStartDate = range.start;
        monthlyEndDate = range.end;
      }
      renderMonthlyRecords();
    };
  });

  // 커스텀 날짜
  if (monthlyPreset === 'custom') {
    const startInput = document.getElementById('customStart');
    const endInput = document.getElementById('customEnd');
    const handleChange = () => {
      monthlyStartDate = startInput.value;
      monthlyEndDate = endInput.value;
      if (monthlyStartDate && monthlyEndDate && monthlyStartDate <= monthlyEndDate) {
        loadMonthlyRecords();
      }
    };
    startInput.onchange = handleChange;
    endInput.onchange = handleChange;
  }

  // 반 필터
  document.getElementById('classFilter').onchange = (e) => {
    monthlyClassFilter = e.target.value;
    loadMonthlyRecords();
  };

  // 다운로드 버튼
  document.getElementById('downloadBtn').onclick = downloadExcel;

  loadMonthlyRecords();
}

let cachedMonthlyData = null; // 다운로드용 캐시

async function loadMonthlyRecords() {
  const monthlyContent = document.getElementById('monthlyContent');
  monthlyContent.innerHTML = '<div class="loading"><div class="spinner"></div>통계 계산 중...</div>';

  try {
    // 기간 내 출결 데이터 가져오기
    const { data: records, error } = await db.from('attendance')
      .select('*')
      .gte('date', monthlyStartDate)
      .lte('date', monthlyEndDate)
      .order('date');
    if (error) throw error;

    // 반 필터 적용된 학생 목록
    const filteredStudents = monthlyClassFilter === 'all' 
      ? students 
      : students.filter(s => s.class_name === monthlyClassFilter);

    if (filteredStudents.length === 0) {
      monthlyContent.innerHTML = '<div class="empty-state">학생이 없습니다.</div>';
      return;
    }

    // 날짜 목록 생성 (시작 ~ 끝)
    const allDates = [];
    const cur = new Date(monthlyStartDate);
    const endDate = new Date(monthlyEndDate);
    while (cur <= endDate) {
      const y = cur.getFullYear();
      const m = String(cur.getMonth() + 1).padStart(2, '0');
      const d = String(cur.getDate()).padStart(2, '0');
      allDates.push(`${y}-${m}-${d}`);
      cur.setDate(cur.getDate() + 1);
    }

    // 학생별 통계 계산
    const studentStats = filteredStudents.map(s => {
      const studentRecords = (records || []).filter(r => r.student_id === s.id);
      const present = studentRecords.filter(r => r.status === 'present').length;
      const absent = studentRecords.filter(r => r.status === 'absent').length;
      const checked = present + absent;
      const rate = checked > 0 ? Math.round((present / checked) * 100) : 0;
      return { student: s, present, absent, checked, rate };
    });

    // 한 번이라도 체크된 학생만 (미체크 학생은 표시 안 함)
    const activeStats = studentStats.filter(stat => stat.checked > 0);

    // 일별 매트릭스용 데이터 (엑셀 다운로드용 — 전체 학생 그대로 유지)
    const matrixData = filteredStudents.map(s => {
      const row = { student: s, byDate: {} };
      allDates.forEach(date => {
        const rec = (records || []).find(r => r.student_id === s.id && r.date === date);
        row.byDate[date] = rec ? rec.status : null;
      });
      return row;
    });

    // 캐시 (다운로드용)
    cachedMonthlyData = {
      startDate: monthlyStartDate,
      endDate: monthlyEndDate,
      classFilter: monthlyClassFilter,
      allDates,
      studentStats,
      matrixData,
    };

    // 전체 통계 (체크된 학생 기반)
    const totalPresent = activeStats.reduce((sum, s) => sum + s.present, 0);
    const totalAbsent = activeStats.reduce((sum, s) => sum + s.absent, 0);
    const totalChecked = totalPresent + totalAbsent;
    const overallRate = totalChecked > 0 ? Math.round((totalPresent / totalChecked) * 100) : 0;

    // 기간 표시
    const startStr = formatDate(monthlyStartDate);
    const endStr = formatDate(monthlyEndDate);
    const periodLabel = (startStr === endStr) ? startStr : `${startStr} ~ ${endStr}`;

    // 학생별 통계 표 (반별로 그룹) — activeStats만
    const studentsByClass = {};
    activeStats.forEach(stat => {
      const cls = stat.student.class_name;
      if (!studentsByClass[cls]) studentsByClass[cls] = [];
      studentsByClass[cls].push(stat);
    });

    let tableHtml = '';
    if (activeStats.length === 0) {
      tableHtml = '<div class="empty-state">이 기간에 출결이 체크된 학생이 없습니다.</div>';
    } else {
      tableHtml = `
        <div class="stats-table">
          <div class="stats-table-row header">
            <div>이름</div>
            <div style="text-align:center;">출석</div>
            <div style="text-align:center;">결석</div>
            <div style="text-align:center;">체크</div>
            <div style="text-align:center;">출석률</div>
          </div>`;

      Object.keys(studentsByClass).forEach(cls => {
        tableHtml += `<div class="class-header">${escapeHtml(cls)}</div>`;
        studentsByClass[cls].forEach(stat => {
          const rateClass = stat.rate >= 90 ? 'high' : (stat.rate >= 70 ? 'mid' : 'low');
          const rateDisplay = stat.checked > 0 ? `${stat.rate}%` : '-';
          tableHtml += `
            <div class="stats-table-row">
              <div class="name-cell">
                ${escapeHtml(stat.student.name)}
                <div class="meta">${escapeHtml(stat.student.grade || '')}</div>
              </div>
              <div class="num-cell green">${stat.present}</div>
              <div class="num-cell red">${stat.absent}</div>
              <div class="num-cell gray">${stat.checked}</div>
              <div class="rate-cell ${rateClass}">${rateDisplay}</div>
            </div>`;
        });
      });
      tableHtml += '</div>';
    }

    monthlyContent.innerHTML = `
      <div class="monthly-summary">
        <div class="monthly-summary-title">📊 기간 통계</div>
        <div class="monthly-summary-period">${periodLabel}</div>
        <div class="monthly-stats-grid">
          <div class="monthly-stat-card">
            <div class="monthly-stat-num">${activeStats.length}</div>
            <div class="monthly-stat-label">총원</div>
          </div>
          <div class="monthly-stat-card">
            <div class="monthly-stat-num green">${totalPresent}</div>
            <div class="monthly-stat-label">출석</div>
          </div>
          <div class="monthly-stat-card">
            <div class="monthly-stat-num red">${totalAbsent}</div>
            <div class="monthly-stat-label">결석</div>
          </div>
          <div class="monthly-stat-card">
            <div class="monthly-stat-num blue">${overallRate}%</div>
            <div class="monthly-stat-label">출석률</div>
          </div>
        </div>
      </div>
      ${tableHtml}`;
  } catch (err) {
    console.error(err);
    monthlyContent.innerHTML = `<div class="error-screen"><strong>⚠️ 불러오기 실패</strong>${escapeHtml(err.message || err)}</div>`;
  }
}

// ============ 엑셀 다운로드 ============
function downloadExcel() {
  if (!cachedMonthlyData) {
    showToast('먼저 데이터를 불러와주세요');
    return;
  }
  if (typeof XLSX === 'undefined') {
    showToast('엑셀 라이브러리 로딩 중... 잠시 후 다시 시도해주세요');
    return;
  }

  try {
    const { startDate, endDate, classFilter, allDates, studentStats, matrixData } = cachedMonthlyData;
    const wb = XLSX.utils.book_new();

    // ===== 시트 1: 학생별 통계 요약 =====
    const summaryData = [];
    summaryData.push(['HI5 부산 센텀점 출결 통계']);
    summaryData.push([`기간: ${startDate} ~ ${endDate}`]);
    summaryData.push([`반: ${classFilter === 'all' ? '전체' : classFilter}`]);
    summaryData.push([`다운로드: ${new Date().toLocaleString('ko-KR')}`]);
    summaryData.push([]);
    summaryData.push(['이름', '반', '학년', '학교', '출석', '결석', '체크합계', '출석률(%)']);

    studentStats.forEach(stat => {
      summaryData.push([
        stat.student.name,
        stat.student.class_name,
        stat.student.grade || '',
        stat.student.school || '',
        stat.present,
        stat.absent,
        stat.checked,
        stat.checked > 0 ? stat.rate : '-',
      ]);
    });

    // 합계 행
    const totalP = studentStats.reduce((s, r) => s + r.present, 0);
    const totalA = studentStats.reduce((s, r) => s + r.absent, 0);
    const totalC = totalP + totalA;
    const totalRate = totalC > 0 ? Math.round((totalP / totalC) * 100) : 0;
    summaryData.push([]);
    summaryData.push(['합계', '', '', '', totalP, totalA, totalC, totalRate]);

    const ws1 = XLSX.utils.aoa_to_sheet(summaryData);

    // 컬럼 너비 조정
    ws1['!cols'] = [
      { wch: 12 }, { wch: 14 }, { wch: 8 }, { wch: 14 },
      { wch: 8 }, { wch: 8 }, { wch: 10 }, { wch: 10 }
    ];

    XLSX.utils.book_append_sheet(wb, ws1, '학생별 통계');

    // ===== 시트 2: 일별 매트릭스 =====
    const matrixHeader = ['이름', '반', '학년'];
    allDates.forEach(date => {
      const d = new Date(date);
      matrixHeader.push(`${d.getMonth()+1}/${d.getDate()}`);
    });
    matrixHeader.push('출석', '결석', '출석률(%)');

    const matrixSheet = [
      ['HI5 부산 센텀점 일별 출결 매트릭스'],
      [`기간: ${startDate} ~ ${endDate}`],
      [`반: ${classFilter === 'all' ? '전체' : classFilter}`],
      [],
      matrixHeader,
    ];

    matrixData.forEach(row => {
      const r = [row.student.name, row.student.class_name, row.student.grade || ''];
      let rowPresent = 0, rowAbsent = 0;
      allDates.forEach(date => {
        const status = row.byDate[date];
        if (status === 'present') { r.push('출석'); rowPresent++; }
        else if (status === 'absent') { r.push('결석'); rowAbsent++; }
        else { r.push(''); }
      });
      const rowChecked = rowPresent + rowAbsent;
      const rowRate = rowChecked > 0 ? Math.round((rowPresent / rowChecked) * 100) : '-';
      r.push(rowPresent, rowAbsent, rowRate);
      matrixSheet.push(r);
    });

    const ws2 = XLSX.utils.aoa_to_sheet(matrixSheet);

    // 매트릭스 시트 컬럼 너비
    const matrixCols = [{ wch: 10 }, { wch: 12 }, { wch: 6 }];
    allDates.forEach(() => matrixCols.push({ wch: 6 }));
    matrixCols.push({ wch: 6 }, { wch: 6 }, { wch: 8 });
    ws2['!cols'] = matrixCols;

    XLSX.utils.book_append_sheet(wb, ws2, '일별 매트릭스');

    // 파일명 생성
    const filterLabel = classFilter === 'all' ? '전체' : classFilter;
    const fileName = `HI5_출결통계_${filterLabel}_${startDate}_${endDate}.xlsx`;

    XLSX.writeFile(wb, fileName);
    showToast('✓ 엑셀 파일이 다운로드되었습니다');
  } catch (err) {
    console.error('엑셀 다운로드 에러:', err);
    showToast('다운로드 실패: ' + (err.message || err));
  }
}

// 초기화
setDate();

// URL 라우팅: /n/{토큰}이면 학부모 공개 페이지, 아니면 평소대로 역할 선택
(function initApp() {
  const path = window.location.pathname;
  const match = path.match(/^\/n\/([a-z0-9]+)\/?$/i);
  if (match) {
    const token = match[1];
    showPublicNotePage(token);
  } else {
    showRoleScreen();
  }
})();
</script>
