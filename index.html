<style>

<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-box">HI5</div>
        <div class="logo-text">하이파이브 미술학원<span>CENTUM · BUSAN <span class="status-badge connecting" id="connStatus">연결 중...</span></span></div>
      </div>
      <div class="header-right">
        <div class="date-info">
          <div class="date-main" id="dateMain"></div>
          <div class="date-sub" id="dateSub"></div>
        </div>
        <button class="icon-header-btn" id="settingsBtn" title="관리자">

<script>
const SUPABASE_URL = 'https://gbjvkbtvcurgsonynokw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_llBLSGHCsOpdKanjt1v2Eg_aHOzIeJP';
const ADMIN_PASSWORD = 'hi5centum';
const AI_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/analyze-artwork`;

const { createClient } = window.supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let students = [];
let attendanceMap = {};
let pendingChanges = {};
let currentTab = '';
let isAdminAuth = false;
let currentAdminTab = 'students';
let currentMode = 'attendance';
let artworks = [];
let teachers = [];                    // 추가: 강사 목록
let selectedTeacherId = null;         // 추가: 작품 업로드 시 선택된 강사
let selectedStudent = null;

function getTodayKey() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}
function setDate() {
  const days = ['일','월','화','수','목','금','토'];
  const now = new Date();
  document.getElementById('dateMain').textContent = `${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  document.getElementById('dateSub').textContent = `${now.getFullYear()}년`;
}
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
function setConnStatus(status, text) {
  const badge = document.getElementById('connStatus');
  badge.className = 'status-badge ' + status;
  badge.textContent = text;
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
}

// 추가: 기본 강사 가져오기
function getDefaultTeacher() {
  return teachers.find(t => t.is_default) || teachers[0] || null;
}

async function loadData() {
  try {
    setConnStatus('connecting', '연결 중...');
    const { data: studentData, error: e1 } = await db.from('students').select('*').order('class_name').order('name');
    if (e1) throw e1;
    students = studentData || [];

    const today = getTodayKey();
    const { data: attData, error: e2 } = await db.from('attendance').select('*').eq('date', today);
    if (e2) throw e2;
    attendanceMap = {};
    (attData || []).forEach(a => { attendanceMap[a.student_id] = a.status; });

    const { data: artData, error: e3 } = await db.from('artworks').select('*').order('created_at', { ascending: false });
    if (e3) throw e3;
    artworks = artData || [];

    // 추가: 강사 목록 로드
    const { data: teacherData, error: e4 } = await db.from('teachers').select('*').order('is_default', { ascending: false }).order('id');
    if (e4) throw e4;
    teachers = teacherData || [];

    // 기본 선택 강사 설정
    if (!selectedTeacherId || !teachers.find(t => t.id === selectedTeacherId)) {
      const def = getDefaultTeacher();
      selectedTeacherId = def ? def.id : null;
    }

    setConnStatus('', '연결됨');
    renderMode();
  } catch (err) {
    console.error(err);
    setConnStatus('error', '연결 오류');
    document.getElementById('content').innerHTML = `<div class="error-screen"><strong>⚠️ 데이터베이스 연결 실패</strong>${escapeHtml(err.message || err)}</div>`;
  }
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    currentMode = btn.dataset.mode;
    selectedStudent = null;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === currentMode));
    renderMode();
  };
});

function renderMode() {
  const saveBar = document.getElementById('saveBar');
  const stats = document.getElementById('statsBar');
  if (currentMode === 'attendance') {
    saveBar.classList.remove('hidden');
    document.getElementById('app').classList.remove('no-savebar');
    stats.style.display = 'grid';
    renderTabs();
    renderStudents();
    updateStats();
  } else {
    saveBar.classList.add('hidden');
    document.getElementById('app').classList.add('no-savebar');
    stats.style.display = 'none';
    renderGallery();
  }
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  if (currentMode !== 'attendance') { tabs.innerHTML = ''; return; }
  const classes = [...new Set(students.map(s => s.class_name))];
  if (!currentTab && classes.length > 0) currentTab = classes[0];
  if (currentTab && !classes.includes(currentTab) && classes.length > 0) currentTab = classes[0];
  tabs.innerHTML = '';
  classes.forEach(name => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (name === currentTab ? ' active' : '');
    tab.textContent = name;
    tab.onclick = () => { currentTab = name; renderTabs(); renderStudents(); };
    tabs.appendChild(tab);
  });
}

function renderStudents() {
  const content = document.getElementById('content');
  if (students.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="big-icon">👥</div>등록된 학생이 없습니다.<br>설정 ⚙️ 에서 학생을 추가해주세요.</div>';
    return;
  }
  content.innerHTML = '<div class="student-list" id="studentList"></div>';
  const list = document.getElementById('studentList');
  const filtered = students.filter(s => s.class_name === currentTab);
  if (filtered.length === 0) { list.innerHTML = '<div class="empty-state">이 반에 학생이 없습니다.</div>'; return; }

  filtered.forEach(s => {
    const status = pendingChanges.hasOwnProperty(s.id) ? pendingChanges[s.id] : attendanceMap[s.id];
    const div = document.createElement('div');
    div.className = 'student' + (status ? ' ' + status : '');
    div.innerHTML = `
      <div class="avatar">${escapeHtml(s.name.charAt(0))}</div>
      <div class="student-info">
        <div class="student-name">${escapeHtml(s.name)}</div>
        <div class="student-meta">${escapeHtml(s.grade || '')} ${s.school ? '· '+escapeHtml(s.school) : ''}</div>
      </div>
      <div class="actions">
        <button class="btn present-btn ${status === 'present' ? 'active' : ''}" data-id="${s.id}" data-action="present">출석</button>
        <button class="btn absent-btn ${status === 'absent' ? 'active' : ''}" data-id="${s.id}" data-action="absent">결석</button>
      </div>`;
    list.appendChild(div);
  });

  list.querySelectorAll('.btn').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.id);
      const action = btn.dataset.action;
      const current = pendingChanges.hasOwnProperty(id) ? pendingChanges[id] : attendanceMap[id];
      pendingChanges[id] = (current === action) ? null : action;
      renderStudents();
      updateStats();
      updateSaveButton();
    };
  });
}

function updateStats() {
  const total = students.length;
  let present = 0, absent = 0;
  students.forEach(s => {
    const status = pendingChanges.hasOwnProperty(s.id) ? pendingChanges[s.id] : attendanceMap[s.id];
    if (status === 'present') present++;
    if (status === 'absent') absent++;
  });
  document.getElementById('totalCount').textContent = total;
  document.getElementById('presentCount').textContent = present;
  document.getElementById('absentCount').textContent = absent;
}

function updateSaveButton() {
  const count = Object.keys(pendingChanges).length;
  document.getElementById('changeCount').textContent = count;
  document.getElementById('saveBtn').disabled = (count === 0);
}

async function save() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  try {
    const today = getTodayKey();
    const upserts = [];
    const deletes = [];
    Object.entries(pendingChanges).forEach(([id, status]) => {
      if (status === null) deletes.push(parseInt(id));
      else upserts.push({ student_id: parseInt(id), date: today, status });
    });
    if (upserts.length > 0) {
      const { error } = await db.from('attendance').upsert(upserts, { onConflict: 'student_id,date' });
      if (error) throw error;
    }
    if (deletes.length > 0) {
      const { error } = await db.from('attendance').delete().eq('date', today).in('student_id', deletes);
      if (error) throw error;
    }
    Object.entries(pendingChanges).forEach(([id, status]) => {
      if (status === null) delete attendanceMap[id];
      else attendanceMap[id] = status;
    });
    pendingChanges = {};
    showToast('✓ 저장되었습니다');
  } catch (err) {
    console.error(err);
    showToast('저장 실패: ' + (err.message || err));
  } finally {
    btn.textContent = '저장하기';
    updateSaveButton();
    renderStudents();
  }
}
document.getElementById('saveBtn').onclick = save;

function renderGallery() {
  document.getElementById('tabs').innerHTML = '';
  const content = document.getElementById('content');
  if (selectedStudent) { renderStudentGallery(selectedStudent); return; }

  const studentArtworkMap = {};
  artworks.forEach(a => {

  });

  let html = '';

    const clsStudents = students.filter(s => s.class_name === cls);
    html += `<div class="gallery-class-section"><div class="class-header">${escapeHtml(cls)}</div><div class="gallery-students">`;

      html += `

          </div>
          <div class="gallery-student-info">
            <div class="gallery-student-name">${escapeHtml(s.name)}</div>
            <div class="gallery-student-count">${studentArts.length}개 작품</div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });
  content.innerHTML = html;
  content.querySelectorAll('.gallery-student-card').forEach(card => {
    card.onclick = () => {
      const id = parseInt(card.dataset.studentId);
      selectedStudent = students.find(s => s.id === id);

}

function renderStudentGallery(student) {
  const content = document.getElementById('content');
  const studentArts = artworks.filter(a => a.student_id === student.id);
  let html = `
    <div class="student-gallery-header">
      <button class="back-btn" id="backToGallery">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="avatar">${escapeHtml(student.name.charAt(0))}</div>

      </div>
    </div>`;
  if (studentArts.length === 0) {
    html += '<div class="empty-state"><div class="big-icon">🎨</div>아직 작품이 없습니다.<br>관리자 페이지에서 작품을 업로드해보세요.</div>';
  } else {
    html += '<div class="gallery-grid">';

  content.innerHTML = html;
  document.getElementById('backToGallery').onclick = () => { selectedStudent = null; renderGallery(); };

function showArtworkDetail(artwork) {
  const student = students.find(s => s.id === artwork.student_id);

          📅 ${formatDate(artwork.created_at)}
          ${teacher ? ` · ✍️ ${escapeHtml(teacher.name)}쌤` : ''}

              <button class="icon-btn danger" data-action="delete" data-id="${s.id}" title="삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>

function showStudentForm(student = null) {
  const isEdit = !!student;
  const classes = [...new Set(students.map(s => s.class_name))];
  const content = document.getElementById('adminContent');
  content.innerHTML = `
    <div style="padding:24px;">
      <div style="font-size:16px;font-weight:700;margin-bottom:20px;">${isEdit ? '학생 수정' : '학생 추가'}</div>
      <div class="form-group">
        <label class="form-label">이름 *</label>
        <input type="text" class="form-input" id="fName" value="${student ? escapeHtml(student.name) : ''}" placeholder="학생 이름" />
      </div>
      <div class="form-group">
        <label class="form-label">반 *</label>
        <select class="form-select" id="fClass">
          ${classes.length === 0 ? '' : classes.map(c => `<option value="${escapeHtml(c)}" ${student && student.class_name === c ? 'selected':''}>${escapeHtml(c)}</option>`).join('')}
          <option value="__new__">+ 새 반 만들기</option>
        </select>
        <input type="text" class="form-input" id="fNewClass" placeholder="새 반 이름" style="display:${classes.length === 0 ? 'block' : 'none'};margin-top:8px;" />
      </div>
      <div class="form-group">
        <label class="form-label">학년</label>
        <input type="text" class="form-input" id="fGrade" value="${student ? escapeHtml(student.grade || '') : ''}" placeholder="예: 고3" />
      </div>
      <div class="form-group">
        <label class="form-label">학교</label>
        <input type="text" class="form-input" id="fSchool" value="${student ? escapeHtml(student.school || '') : ''}" placeholder="예: 센텀고" />
      </div>
      <div class="form-buttons">
        <button class="form-btn" id="fCancel">취소</button>
        <button class="form-btn primary" id="fSave">${isEdit ? '수정' : '추가'}</button>
      </div>
    </div>`;
  const classSelect = document.getElementById('fClass');
  const newClassInput = document.getElementById('fNewClass');
  if (classes.length === 0) classSelect.value = '__new__';
  classSelect.onchange = () => {
    if (classSelect.value === '__new__') { newClassInput.style.display = 'block'; newClassInput.focus(); }
    else newClassInput.style.display = 'none';
  };
  document.getElementById('fCancel').onclick = renderStudentManager;
  document.getElementById('fSave').onclick = async () => {
    const name = document.getElementById('fName').value.trim();
    let className = classSelect.value;
    if (className === '__new__') className = newClassInput.value.trim();
    const grade = document.getElementById('fGrade').value.trim();
    const school = document.getElementById('fSchool').value.trim();
    if (!name) { showToast('이름을 입력해주세요'); return; }
    if (!className) { showToast('반을 선택해주세요'); return; }
    try {
      if (isEdit) {
        const { error } = await db.from('students').update({ name, class_name: className, grade, school }).eq('id', student.id);
        if (error) throw error;
        showToast('✓ 수정되었습니다');
      } else {
        const { error } = await db.from('students').insert({ name, class_name: className, grade, school });
        if (error) throw error;
        showToast('✓ 추가되었습니다');
      }
      await loadData();
      renderStudentManager();
    } catch (err) {
      console.error(err);
      showToast('실패: ' + (err.message || err));
    }
  };
}

async function deleteStudent(student) {
  if (!confirm(`'${student.name}' 학생을 삭제하시겠습니까?\n관련 출결 기록과 작품도 모두 삭제됩니다.`)) return;
  try {
    const { error } = await db.from('students').delete().eq('id', student.id);
    if (error) throw error;
    showToast('✓ 삭제되었습니다');
    await loadData();
    renderStudentManager();
  } catch (err) {
    console.error(err);
    showToast('삭제 실패: ' + (err.message || err));
  }
}

async function renameClass(oldName) {
  const newName = prompt(`'${oldName}' 의 새 이름을 입력하세요:`, oldName);
  if (!newName || newName === oldName) return;
  if (!newName.trim()) { showToast('이름을 입력해주세요'); return; }
  try {
    const { error } = await db.from('students').update({ class_name: newName.trim() }).eq('class_name', oldName);
    if (error) throw error;
    showToast('✓ 반 이름이 변경되었습니다');
    if (currentTab === oldName) currentTab = newName.trim();
    await loadData();
    renderClassManager();
  } catch (err) {
    console.error(err);
    showToast('변경 실패: ' + (err.message || err));
  }
}

function showTeacherForm(teacher = null) {
  const isEdit = !!teacher;
  const content = document.getElementById('adminContent');
  content.innerHTML = `
    <div style="padding:24px;">
      <div style="font-size:16px;font-weight:700;margin-bottom:20px;">${isEdit ? '강사 수정' : '강사 추가'}</div>
      
      <div class="form-group">
        <label class="form-label">프로필 사진<span class="form-label-hint">(선택)</span></label>
        <div class="upload-area ${teacher && teacher.avatar_url ? 'has-image' : ''}" id="teacherAvatarArea">
          ${teacher && teacher.avatar_url ? `<img class="upload-preview" src="${escapeHtml(teacher.avatar_url)}" style="max-height:200px;" id="teacherAvatarPreview" />` : `
            <div class="upload-icon">👤</div>
            <div class="upload-text">탭해서 프로필 사진 선택<br><span style="font-size:11px;">(선택사항)</span></div>
          `}
        </div>
        <input type="file" id="fTeacherAvatar" accept="image/*" style="display:none;" />
      </div>

      <div class="form-group">
        <label class="form-label">이름 *</label>
        <input type="text" class="form-input" id="fTeacherName" value="${teacher ? escapeHtml(teacher.name) : ''}" placeholder="예: 경학" />
        <div style="font-size:11px;color:#888;margin-top:4px;">이름 뒤에 자동으로 "쌤"이 붙습니다 (예: 경학쌤)</div>
      </div>

      <div class="form-group">
        <label class="form-label">AI 톤 스타일 *</label>
        <textarea class="form-textarea" id="fTeacherTone" placeholder="예: 다정하지만 담백하게, 마무리는 따뜻한 응원으로">${teacher ? escapeHtml(teacher.ai_tone_style || '') : ''}</textarea>
        <div style="font-size:11px;color:#888;margin-top:4px;">선생님의 전반적인 말투/분위기를 자유롭게 설명해주세요</div>
      </div>

      <div class="form-group">
        <label class="form-label">자주 쓰는 말투/특징<span class="form-label-hint">(선택)</span></label>
        <textarea class="form-textarea" id="fTeacherStyle" placeholder="예: '~습니다' 정중한 어미. 이모티콘은 ^^ 정도만. 끝맺음에 응원 한마디.">${teacher ? escapeHtml(teacher.writing_style || '') : ''}</textarea>
        <div style="font-size:11px;color:#888;margin-top:4px;">구체적인 어미·이모티콘 사용 패턴 등</div>
      </div>

      <div class="form-group">
        <label class="form-label">샘플 코멘트 ⭐<span class="form-label-hint">(강추)</span></label>
        <textarea class="form-textarea large" id="fTeacherSample" placeholder="실제 작성하셨던 작품 코멘트를 1~2개 붙여넣으세요. AI가 이 글의 톤을 그대로 학습합니다.">${teacher ? escapeHtml(teacher.sample_comment || '') : ''}</textarea>
        <div style="font-size:11px;color:#c0392b;margin-top:4px;font-weight:500;">⭐ 이 항목이 가장 중요합니다! 실제 코멘트가 있으면 AI가 톤을 훨씬 정확하게 재현합니다.</div>
      </div>

      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="fTeacherDefault" ${teacher && teacher.is_default ? 'checked' : ''} />
          <span style="font-size:13px;font-weight:700;">기본 강사로 설정</span>
        </label>
        <div style="font-size:11px;color:#888;margin-top:4px;margin-left:24px;">작품 업로드 시 자동으로 선택됩니다 (1명만 가능)</div>
      </div>

      <div class="form-buttons">
        <button class="form-btn" id="fCancel">취소</button>
        <button class="form-btn primary" id="fSave">${isEdit ? '수정' : '추가'}</button>
      </div>
    </div>`;

  // 아바타 업로드 처리
  const avatarArea = document.getElementById('teacherAvatarArea');
  const avatarInput = document.getElementById('fTeacherAvatar');
  let selectedAvatarFile = null;
  let avatarRemoved = false;

  avatarArea.onclick = () => avatarInput.click();

  avatarInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('이미지 파일만 업로드 가능합니다'); return; }
    if (file.size > 5 * 1024 * 1024) { showToast('파일 크기는 5MB 이하여야 합니다'); return; }
    selectedAvatarFile = file;
    avatarRemoved = false;
    const reader = new FileReader();
    reader.onload = (ev) => {
      avatarArea.classList.add('has-image');
      avatarArea.innerHTML = `<img class="upload-preview" src="${ev.target.result}" style="max-height:200px;" />`;
    };
    reader.readAsDataURL(file);
  };

  document.getElementById('fCancel').onclick = renderTeacherManager;

  document.getElementById('fSave').onclick = async () => {
    const name = document.getElementById('fTeacherName').value.trim();
    const ai_tone_style = document.getElementById('fTeacherTone').value.trim();
    const writing_style = document.getElementById('fTeacherStyle').value.trim();
    const sample_comment = document.getElementById('fTeacherSample').value.trim();
    const is_default = document.getElementById('fTeacherDefault').checked;

    if (!name) { showToast('이름을 입력해주세요'); return; }
    if (!ai_tone_style) { showToast('AI 톤 스타일을 입력해주세요'); return; }

    const saveBtn = document.getElementById('fSave');
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';

    try {
      let avatar_url = teacher ? teacher.avatar_url : null;

      // 아바타 업로드
      if (selectedAvatarFile) {
        const ext = selectedAvatarFile.name.split('.').pop();
        const fileName = `teacher_${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${ext}`;
        const { error: uploadError } = await db.storage.from('artworks').upload(fileName, selectedAvatarFile, { cacheControl: '3600', upsert: false });
        if (uploadError) throw uploadError;
        const { data: urlData } = db.storage.from('artworks').getPublicUrl(fileName);
        avatar_url = urlData.publicUrl;
        // 기존 아바타 삭제
        if (isEdit && teacher.avatar_url) {
          const oldPath = teacher.avatar_url.split('/artworks/').pop();
          if (oldPath) await db.storage.from('artworks').remove([oldPath]).catch(()=>{});
        }
      }

      const payload = { name, ai_tone_style, writing_style, sample_comment, avatar_url, is_default };

      // 기본 강사 처리: 다른 강사들의 is_default를 false로
      if (is_default) {
        await db.from('teachers').update({ is_default: false }).neq('id', isEdit ? teacher.id : -1);
      }

      if (isEdit) {
        const { error } = await db.from('teachers').update(payload).eq('id', teacher.id);
        if (error) throw error;
        showToast('✓ 수정되었습니다');
      } else {
        const { error } = await db.from('teachers').insert(payload);
        if (error) throw error;
        showToast('✓ 추가되었습니다');
      }
      await loadData();
      renderTeacherManager();
    } catch (err) {
      console.error(err);
      showToast('실패: ' + (err.message || err));
      saveBtn.disabled = false;
      saveBtn.textContent = isEdit ? '수정' : '추가';
    }
  };
}

async function deleteTeacher(teacher) {
  if (teachers.length <= 1) {
    showToast('최소 1명의 강사는 등록되어 있어야 합니다');
    return;
  }
  if (!confirm(`'${teacher.name}쌤'을 삭제하시겠습니까?\n이 강사가 작성한 작품 코멘트의 강사 정보는 사라지지만, 코멘트 내용은 유지됩니다.`)) return;
  try {
    // 아바타 이미지도 삭제
    if (teacher.avatar_url) {
      const path = teacher.avatar_url.split('/artworks/').pop();
      if (path) await db.storage.from('artworks').remove([path]).catch(()=>{});
    }
    const { error } = await db.from('teachers').delete().eq('id', teacher.id);
    if (error) throw error;
    showToast('✓ 삭제되었습니다');
    await loadData();
    renderTeacherManager();
  } catch (err) {
    console.error(err);
    showToast('삭제 실패: ' + (err.message || err));
  }
}

          <div class="admin-item-info">
            <div class="admin-item-name">${escapeHtml(a.title || '제목 없음')}</div>
            <div class="admin-item-meta">${student ? escapeHtml(student.name) : '(삭제된 학생)'} · ${formatDate(a.created_at)}${teacher ? ` · ${escapeHtml(teacher.name)}쌤` : ''}</div>
          </div>
          <div class="admin-item-actions">
            <button class="icon-btn" data-action="edit" data-id="${a.id}" title="수정"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="icon-btn danger" data-action="delete" data-id="${a.id}" title="삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
          </div>
        </div>`;
    });
  }
  content.innerHTML = html;
  document.getElementById('addArtworkBtn').onclick = () => showArtworkForm();
  content.querySelectorAll('[data-action]').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.id);
      const action = btn.dataset.action;
      const artwork = artworks.find(a => a.id === id);
      if (action === 'edit') showArtworkForm(artwork);
      else if (action === 'delete') deleteArtwork(artwork);
    };
  });
}

function showArtworkForm(artwork = null) {
  const isEdit = !!artwork;
  const content = document.getElementById('adminContent');
  if (students.length === 0) {
    content.innerHTML = '<div class="empty-state">먼저 학생을 등록해주세요.</div>';
    return;
  }
  if (teachers.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">👨‍🏫</div>
        먼저 강사를 등록해주세요.<br>
        <button class="add-btn" style="margin-top:16px;" id="goTeacherTab">강사 등록하러 가기</button>
      </div>`;
    document.getElementById('goTeacherTab').onclick = () => {
      currentAdminTab = 'teachers';
      renderAdminPanel();
    };
    return;
  }

  // 작품 수정 시 해당 작품의 강사 선택
  const formTeacherId = isEdit && artwork.teacher_id ? artwork.teacher_id : (selectedTeacherId || (getDefaultTeacher() && getDefaultTeacher().id));

  content.innerHTML = `
    <div style="padding:24px;">
      <div style="font-size:16px;font-weight:700;margin-bottom:20px;">${isEdit ? '작품 수정' : '작품 업로드'}</div>
      <div class="form-group">
        <label class="form-label">이미지 ${isEdit ? '' : '*'}</label>
        <div class="upload-area ${isEdit ? 'has-image' : ''}" id="uploadArea">
          ${isEdit ? `<img class="upload-preview" src="${escapeHtml(artwork.image_url)}" id="uploadPreview" />` : `
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">이미지를 선택하거나<br><strong>여기를 탭</strong>해서 업로드</div>
          `}
        </div>
        <input type="file" id="fImage" accept="image/*" style="display:none;" />
        ${isEdit ? '<div style="font-size:11px;color:#888;margin-top:6px;">※ 이미지를 변경하려면 위 이미지를 탭하세요</div>' : ''}
      </div>

      <div class="form-group">
        <label class="form-label">분석할 강사 *</label>
        <select class="form-select" id="fArtworkTeacher">
          ${teachers.map(t => `<option value="${t.id}" ${t.id === formTeacherId ? 'selected' : ''}>${escapeHtml(t.name)}쌤${t.is_default ? ' (기본)' : ''}</option>`).join('')}
        </select>
        <div style="font-size:11px;color:#888;margin-top:4px;">이 선생님의 톤으로 AI가 분석합니다</div>
      </div>

      <button class="ai-analyze-btn" id="aiAnalyzeBtn" type="button" disabled>
        <span class="ai-icon">🤖</span>
        <span id="aiAnalyzeBtnText">AI로 분석하기</span>
      </button>
      <div class="ai-hint">이미지 선택 후 클릭하면 <strong>선택한 강사 톤으로</strong> AI가 자동 작성합니다</div>

      <div class="form-group">
        <label class="form-label">학생 *</label>
        <select class="form-select" id="fStudent">
          ${students.map(s => `<option value="${s.id}" ${artwork && artwork.student_id === s.id ? 'selected':''}>${escapeHtml(s.name)} (${escapeHtml(s.class_name)})</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">제목</label>
        <input type="text" class="form-input" id="fTitle" value="${artwork ? escapeHtml(artwork.title || '') : ''}" placeholder="예: 정물 연구 - 사과와 항아리" />
      </div>
      <div class="form-group">
        <label class="form-label">수업 주제</label>
        <input type="text" class="form-input" id="fSubject" value="${artwork ? escapeHtml(artwork.subject || '') : ''}" placeholder="예: 기초 디자인, 발상과 표현" />
      </div>
      <div class="form-group">
        <label class="form-label">설명 / 코멘트</label>
        <textarea class="form-textarea" id="fDescription" placeholder="작품에 대한 설명이나 강사 코멘트를 입력하세요">${artwork ? escapeHtml(artwork.description || '') : ''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">태그 (쉼표로 구분)</label>
        <input type="text" class="form-input" id="fTags" value="${artwork && artwork.tags ? escapeHtml(artwork.tags.join(', ')) : ''}" placeholder="예: 우수작, 입시포트폴리오, 정물화" />
      </div>
      <div class="form-buttons">
        <button class="form-btn" id="fCancel">취소</button>
        <button class="form-btn primary" id="fSave">${isEdit ? '수정' : '업로드'}</button>
      </div>
    </div>`;

  const uploadArea = document.getElementById('uploadArea');
  const fImage = document.getElementById('fImage');
  const aiBtn = document.getElementById('aiAnalyzeBtn');
  const aiBtnText = document.getElementById('aiAnalyzeBtnText');
  let selectedFile = null;
  let imageDataUrl = null;
  let imageBase64 = null;
  let imageMimeType = null;

  // 수정 모드: 기존 이미지가 있으면 AI 버튼 활성화
  if (isEdit && artwork.image_url) {
    aiBtn.disabled = false;
    fetch(artwork.image_url).then(r => r.blob()).then(blob => {
      imageMimeType = blob.type;
      const reader = new FileReader();
      reader.onload = e => {
        imageBase64 = e.target.result.split(',')[1];
      };
      reader.readAsDataURL(blob);
    }).catch(() => {});
  }

  uploadArea.onclick = () => fImage.click();

  fImage.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('이미지 파일만 업로드 가능합니다'); return; }
    if (file.size > 10 * 1024 * 1024) { showToast('파일 크기는 10MB 이하여야 합니다'); return; }
    selectedFile = file;
    imageMimeType = file.type;
    const reader = new FileReader();
    reader.onload = (ev) => {
      imageDataUrl = ev.target.result;
      imageBase64 = imageDataUrl.split(',')[1];
      uploadArea.classList.add('has-image');
      uploadArea.innerHTML = `<img class="upload-preview" src="${imageDataUrl}" />`;
      aiBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  };

  // 강사 변경 시 selectedTeacherId 업데이트
  document.getElementById('fArtworkTeacher').onchange = (e) => {
    selectedTeacherId = parseInt(e.target.value);
  };

  // AI 분석 버튼
  aiBtn.onclick = async () => {
    if (!imageBase64) { showToast('이미지를 먼저 선택해주세요'); return; }
    
    aiBtn.disabled = true;
    aiBtn.innerHTML = `<span class="ai-spinner"></span><span>AI 분석 중... (5~10초)</span>`;

    try {
      const studentId = parseInt(document.getElementById('fStudent').value);
      const teacherId = parseInt(document.getElementById('fArtworkTeacher').value);
      const student = students.find(s => s.id === studentId);
      const teacher = teachers.find(t => t.id === teacherId);

      const response = await fetch(AI_FUNCTION_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify({
          imageBase64,
          mimeType: imageMimeType,
          studentInfo: student ? { name: student.name, grade: student.grade, school: student.school, class_name: student.class_name } : null,
          teacherInfo: teacher ? {
            name: teacher.name,
            ai_tone_style: teacher.ai_tone_style,
            writing_style: teacher.writing_style,
            sample_comment: teacher.sample_comment
          } : null
        })
      });

      const data = await response.json();

      if (!response.ok || data.error) {
        throw new Error(data.error || `HTTP ${response.status}`);
      }

      if (data.title) document.getElementById('fTitle').value = data.title;
      if (data.subject) document.getElementById('fSubject').value = data.subject;
      if (data.description) document.getElementById('fDescription').value = data.description;
      if (data.tags && data.tags.length > 0) document.getElementById('fTags').value = data.tags.join(', ');

      const teacherName = teacher ? `${teacher.name}쌤` : 'AI';
      showToast(`✨ ${teacherName} 톤으로 분석 완료!`);
    } catch (err) {
      console.error('AI analyze error:', err);
      showToast('AI 분석 실패: ' + (err.message || err));
    } finally {
      aiBtn.disabled = false;
      aiBtn.innerHTML = `<span class="ai-icon">🤖</span><span>AI로 분석하기</span>`;
    }
  };

  document.getElementById('fCancel').onclick = renderArtworkManager;

  document.getElementById('fSave').onclick = async () => {
    const studentId = parseInt(document.getElementById('fStudent').value);
    const teacherId = parseInt(document.getElementById('fArtworkTeacher').value);
    const title = document.getElementById('fTitle').value.trim();
    const subject = document.getElementById('fSubject').value.trim();
    const description = document.getElementById('fDescription').value.trim();
    const tagsRaw = document.getElementById('fTags').value.trim();
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];

    if (!isEdit && !selectedFile) { showToast('이미지를 선택해주세요'); return; }
    if (!studentId) { showToast('학생을 선택해주세요'); return; }

    const saveBtn = document.getElementById('fSave');
    saveBtn.disabled = true;
    saveBtn.textContent = '업로드 중...';

    try {
      let imageUrl = artwork ? artwork.image_url : null;
      if (selectedFile) {
        const ext = selectedFile.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${ext}`;
        const { error: uploadError } = await db.storage.from('artworks').upload(fileName, selectedFile, { cacheControl: '3600', upsert: false });
        if (uploadError) throw uploadError;
        const { data: urlData } = db.storage.from('artworks').getPublicUrl(fileName);
        imageUrl = urlData.publicUrl;
        if (isEdit && artwork.image_url) {
          const oldPath = artwork.image_url.split('/artworks/').pop();
          if (oldPath) await db.storage.from('artworks').remove([oldPath]).catch(()=>{});
        }
      }
      const payload = {
        student_id: studentId,
        teacher_id: teacherId || null,
        image_url: imageUrl,
        title: title || null,
        subject: subject || null,
        description: description || null,
        tags: tags.length > 0 ? tags : null
      };
      if (isEdit) {
        const { error } = await db.from('artworks').update(payload).eq('id', artwork.id);
        if (error) throw error;
        showToast('✓ 작품이 수정되었습니다');
      } else {
        const { error } = await db.from('artworks').insert(payload);
        if (error) throw error;
        showToast('✓ 작품이 업로드되었습니다');
      }
      await loadData();
      renderArtworkManager();
    } catch (err) {
      console.error(err);
      showToast('실패: ' + (err.message || err));
      saveBtn.disabled = false;
      saveBtn.textContent = isEdit ? '수정' : '업로드';
    }
  };
}

async function deleteArtwork(artwork) {
  if (!confirm('이 작품을 삭제하시겠습니까?')) return;
  try {
    if (artwork.image_url) {
      const path = artwork.image_url.split('/artworks/').pop();
      if (path) await db.storage.from('artworks').remove([path]).catch(()=>{});
    }
    const { error } = await db.from('artworks').delete().eq('id', artwork.id);
    if (error) throw error;
    showToast('✓ 삭제되었습니다');
    await loadData();
    if (currentMode === 'gallery') renderGallery();
    else renderArtworkManager();
  } catch (err) {
    console.error(err);
    showToast('삭제 실패: ' + (err.message || err));
  }
}

async function renderRecordViewer() {
  const content = document.getElementById('adminContent');
  const today = getTodayKey();
  content.innerHTML = `
    <div class="record-controls">
      <label class="form-label">날짜 선택</label>
      <input type="date" class="date-input" id="recordDate" value="${today}" />
      <div class="record-summary" id="recordSummary"></div>
    </div>
    <div id="recordList"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>`;
  const dateInput = document.getElementById('recordDate');
  dateInput.onchange = () => loadRecords(dateInput.value);
  loadRecords(today);
}

async function loadRecords(date) {
  const summary = document.getElementById('recordSummary');
  const list = document.getElementById('recordList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  try {
    const { data: records, error } = await db.from('attendance').select('*').eq('date', date);
    if (error) throw error;
    const recordMap = {};
    (records || []).forEach(r => { recordMap[r.student_id] = r.status; });
    let present = 0, absent = 0, none = 0;
    students.forEach(s => {
      const status = recordMap[s.id];
      if (status === 'present') present++;
      else if (status === 'absent') absent++;
      else none++;
    });
    summary.innerHTML = `
      <div class="summary-card"><div class="summary-num green">${present}</div><div class="summary-label">출석</div></div>
      <div class="summary-card"><div class="summary-num red">${absent}</div><div class="summary-label">결석</div></div>
      <div class="summary-card"><div class="summary-num gray">${none}</div><div class="summary-label">미체크</div></div>`;
    if (students.length === 0) { list.innerHTML = '<div class="empty-state">학생이 없습니다.</div>'; return; }
    const classes = [...new Set(students.map(s => s.class_name))];
    let html = '';
    classes.forEach(cls => {
      const clsStudents = students.filter(s => s.class_name === cls);
      html += `<div class="class-header">${escapeHtml(cls)}</div>`;
      clsStudents.forEach(s => {
        const status = recordMap[s.id];
        const statusHtml = status === 'present' ? '<span class="record-status present">출석</span>' : status === 'absent' ? '<span class="record-status absent">결석</span>' : '<span class="record-status none">미체크</span>';
        html += `
          <div class="admin-list-item">
            <div class="avatar" style="width:36px;height:36px;font-size:13px;">${escapeHtml(s.name.charAt(0))}</div>
            <div class="admin-item-info">
              <div class="admin-item-name">${escapeHtml(s.name)}</div>
              <div class="admin-item-meta">${escapeHtml(s.grade || '')} ${s.school ? '· '+escapeHtml(s.school) : ''}</div>
            </div>
            <div>${statusHtml}</div>
          </div>`;
      });
    });
    list.innerHTML = html;
  } catch (err) {
    console.error(err);
    list.innerHTML = `<div class="error-screen"><strong>⚠️ 불러오기 실패</strong>${escapeHtml(err.message || err)}</div>`;
  }
}

setDate();
loadData();
</script>
